<div class="color-picker-container">
      <h3 class="picker-title">Seleccionar Color (Gama Completa)</h3>

      <!-- Contenedor principal de la paleta -->
      <div class="palette-grid">

        <!-- Itera sobre cada grupo de color (Azul, Verde, Rojo, etc.) -->
        <div *ngFor="let group of colorGroups" class="color-group">
          <div class="group-name">{{ group.name }}</div>

          <!-- Itera sobre los 10 tonos de cada grupo -->
          <div class="intensity-row">
            <button
              *ngFor="let chip of group.chips"
              (click)="selectColor(chip.hex)"
              [title]="group.name + ' - ' + chip.intensity + ' (' + chip.hex + ')'"
              [ngClass]="{ 'selected': chip.hex === selectedColor() }"
              [style.backgroundColor]="chip.hex"
              class="color-chip">
            </button>
          </div>
        </div>
      </div>

      <!-- Muestra la previsualización del color seleccionado -->
      <div class="selected-display">
        Color Seleccionado:
        <span
          class="selected-chip"
          [style.backgroundColor]="selectedColor()">
        </span>
        <code class="hex-code">{{ selectedColor() }}</code>
      </div>

    </div>
