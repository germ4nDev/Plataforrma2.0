<table *ngIf="dtOptions" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="table row-border">
  <thead>
    <tr>
      <th *ngFor="let title of columnTitles">{{ title | translate }}</th>
      <th *ngIf="showActions">{{ 'PLATAFORMA.OPTIONS' | translate }}</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of data">
      <td *ngFor="let col of columns">{{ item[col] }}</td>
      <td *ngIf="showActions" class="text-center">
        <button
          type="button"
          class="btn btn-icon btn-outline-primary btn-sm me-1"
          (click)="onEditClick(item[idField])"
          [title]="'APLICACIONES.UPDATE' | translate"
        >
          <i class="feather icon-edit"></i>
        </button>
        <button
          type="button"
          class="btn btn-icon btn-outline-danger btn-sm"
          (click)="onDeleteClick(item[idField], item.nombreAplicacion)"
          [title]="'APLICACIONES.DELETE' | translate"
        >
          <i class="feather icon-trash-2"></i>
        </button>
      </td>
    </tr>
  </tbody>
  <tfoot>
  <tr>
    <ng-container *ngFor="let filter of columnFilters; let i = index">
      <th *ngIf="filter">
        <input type="text" class="form-control"
               [placeholder]="columnTitles[i] | translate"
               (keyup)="filtrarColumna(i, $event)">
      </th>
      <th *ngIf="!filter"></th>
    </ng-container>
    <th *ngIf="showActions"></th>
  </tr>
</tfoot>

</table>
