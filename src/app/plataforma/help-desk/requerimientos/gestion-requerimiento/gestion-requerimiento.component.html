<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>

            <ng-container>
                <app-nav-content [navigationItems]="menuItems"></app-nav-content>
            </ng-container>
        </div>
    </aside>
    <div class="content-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <h4>{{ 'TICKETS.REQUERIMIENTOS.GESTION.TITLE' | translate }}</h4>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex gap-3">
                        <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'TICKETS.REQUERIMIENTOS.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'TICKETS.REQUERIMIENTOS.GESTION.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card content-scroll-wrapper">
            <div class="card-header">
                <h4 *ngIf="!modoEdicion">{{ 'TICKETS.REQUERIMIENTOS.NEW' | translate }}</h4>
                <h4 *ngIf="modoEdicion">{{ 'TICKETS.REQUERIMIENTOS.UPDATE' | translate }}</h4>
            </div>
            <div class="card-body">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="ticketId">{{
                                    'TICKETS.REQUERIMIENTOS.GESTION.TICKET' | translate }}</label>
                                <select class="form-control input-md" style="cursor: pointer;" name="ticketId"
                                    id="ticketId"
                                    [ngClass]="{ 'is-invalid': !ticketId.valid && (ticketId.dirty || ticketId.touched || isSubmit) }"
                                    #ticketId="ngModel" required [(ngModel)]="FormRegistro.ticketId"
                                    (change)="onTicketchangeClick($event)">
                                    <option value="" disabled>{{ 'TICKETS.REQUERIMIENTOS.GESTION.PLACEHOLDERTICKET' |
                                        translate }}</option>
                                    <option [value]="ticket.ticketId" *ngFor="let ticket of ticket">{{
                                        ticket.nombreTicket }}</option>
                                </select>
                                <label *ngIf="!ticketId.valid && (ticketId.dirty || ticketId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'TICKETS.REQUERIMIENTOS.GESTION.REQUERIDOTICKET' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreRequerimiento">{{
                                    'TICKETS.REQUERIMIENTOS.GESTION.NAME' | translate }}</label>
                                <input class="form-control input-md" id="nombreRequerimiento" name="nombreRequerimiento"
                                    type="text"
                                    placeholder="{{ 'TICKETS.REQUERIMIENTOS.GESTION.NAMEHOLDER' | translate }}"
                                    [ngClass]="{ 'is-invalid': !nombreRequerimiento.valid && (nombreRequerimiento.dirty || nombreRequerimiento.touched || isSubmit) }"
                                    #nombreRequerimiento="ngModel" required
                                    [(ngModel)]="FormRegistro.nombreRequerimiento" />
                                <label
                                    *ngIf="!nombreRequerimiento.valid && (nombreRequerimiento.dirty || nombreRequerimiento.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'TICKETS.REQUERIMIENTOS.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'TICKETS.REQUERIMIENTOS.GESTION.DESCRIPTION' | translate
                                    }}</label>
                                <textarea class="form-control"
                                    placeholder="{{ 'TICKETS.REQUERIMIENTOS.GESTION.DESCRIPTIONHOLDER' | translate }}"
                                    name="descripcionRequerimiento"
                                    [ngClass]="{
                                    'is-invalid': !descripcionRequerimiento.valid && (descripcionRequerimiento.dirty || descripcionRequerimiento.touched || isSubmit)}"
                                    #descripcionRequerimiento="ngModel" required
                                    [(ngModel)]="FormRegistro.descripcionRequerimiento" rows="5">
                                </textarea>
                                <label
                                    *ngIf="!descripcionRequerimiento.valid && (descripcionRequerimiento.dirty || descripcionRequerimiento.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'TICKETS.REQUERIMIENTOS.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="estadoId">
                                    {{ 'TICKETS.REQUERIMIENTOS.GESTION.STATUS' | translate }}</label>
                                <select class="form-control input-md" style="cursor: pointer;" name="estadoId"
                                    id="estadoId" disabled [ngStyle]="{'cursor': 'not-allowed'}"
                                    [ngClass]="{ 'is-invalid': !estadoId.valid && (estadoId.dirty || estadoId.touched || isSubmit) }"
                                    #estadoId="ngModel" required [(ngModel)]="FormRegistro.estadoRequerimiento"
                                    (change)="onEstadoChangeClick($event)">
                                    <option [value]="estado.siglaEstado" *ngFor="let estado of estadosFiltrados">
                                        {{ estado.nombreEstado }}
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
