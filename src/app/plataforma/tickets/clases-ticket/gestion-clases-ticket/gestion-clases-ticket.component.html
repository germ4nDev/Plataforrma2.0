<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom"><button>{{ 'PLATAFORMA.MENU' | translate }}</button></div>
            <ng-container><app-nav-content [navigationItems]="menuItems | async"></app-nav-content></ng-container>
        </div>
    </aside>
    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'TICKETS.CLASESTICKET.NEW' | translate }}
                        </h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'TICKETS.CLASESTICKET.UPDATE' | translate }}
                        </h4>
                    </div>
                    <div class="d-flex">
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                        <button *ngIf="!modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'TICKETS.CLASESTICKET.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'TICKETS.CLASESTICKET.GESTION.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'TICKETS.CLASESTICKET.GESTION.CODIGOCLASE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoClase"
                                    placeholder="{{ 'TICKETS.CLASESTICKET.GESTION.PLACEHOLDERCODE' | translate }}"
                                    [ngClass]="{'is-invalid': !codigoClase.valid && (codigoClase.dirty || codigoClase.touched || isSubmit) }"
                                    #codigoClase="ngModel" required [(ngModel)]="FormRegistro.codigoClase"
                                    readonly />
                                <label
                                    *ngIf="!codigoClase.valid && (codigoClase.dirty || codigoClase.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'TICKETS.CLASESTICKET.GESTION.REQUERIDCODE' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="claseTicket">{{ 'TICKETS.CLASESTICKET.GESTION.NOMBRECLASE' | translate
                                    }}</label>
                                <input class="form-control form-input" id="claseTicket" name="claseTicket" type="text"
                                    placeholder="{{ 'TICKETS.CLASESTICKET.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{'is-invalid': !claseTicket.valid && (claseTicket.dirty || claseTicket.touched || isSubmit)}"
                                    #claseTicket="ngModel" required [(ngModel)]="FormRegistro.claseTicket" />
                                <label
                                    *ngIf="!claseTicket.valid && (claseTicket.dirty || claseTicket.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'TICKETS.CLASESTICKET.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'TICKETS.CLASESTICKET.GESTION.DESCRIPTION' | translate }}</label>
                                <app-text-editor
                                    [toolbarType]="tipoEditorTexto"
                                    [contentHtml]="FormRegistro.descripcionClase ?? ''"
                                    (contentHtmlChange)="actualizarDescripcionVersion($event)"
                                    name="descripcionClase"
                                    [(ngModel)]="FormRegistro.descripcionClase"
                                    [ngClass]="{'is-invalid': !descripcionClase.valid && (descripcionClase.dirty || descripcionClase.touched || isSubmit)}"
                                    #descripcionClase="ngModel"
                                    required
                                    rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionClase.valid && (descripcionClase.dirty || descripcionClase.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'TICKETS.CLASESTICKET.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'TICKETS.CLASESTICKET.GESTION.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="estadoClase" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoClase">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="estadoClase" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoClase">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
