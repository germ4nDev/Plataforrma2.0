<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>

            <ng-container>
                <app-nav-content [navigationItems]="menuItems"></app-nav-content>
            </ng-container>
        </div>
    </aside>
    <div class="content-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <h5>{{ 'SUSCRIPTORES.EMPRESASSC.GESTION.TITLE' | translate }}</h5>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex gap-3">
                        <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SUSCRIPTORES.EMPRESASSC.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SUSCRIPTORES.EMPRESASSC.GESTION.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card content-scroll-wrapper">
            <div class="card-header">
                <h4 *ngIf="!modoEdicion">{{ 'SUSCRIPTORES.EMPRESASSC.GESTION.NEW' | translate }}</h4>
                <h4 *ngIf="modoEdicion">{{ 'SUSCRIPTORES.EMPRESASSC.GESTION.UPDATE' | translate }}</h4>
            </div>
            <div class="card-body">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="suscriptorId">
                                    {{ 'SUSCRIPTORES.EMPRESASSC.GESTION.SUSCRIPTOR' | translate }}</label>
                                <select class="form-control input-md" style="cursor: pointer;" name="suscriptorId" id="suscriptorId"
                                    [ngClass]="{ 'is-invalid': !suscriptorId.valid && (suscriptorId.dirty || suscriptorId.touched || isSubmit) }"
                                    #suscriptorId="ngModel" required [(ngModel)]="FormRegistro.suscriptorId"
                                    (change)="onSuscriptorChangeClick($event)">
                                    <option value="" disabled>{{ 'SUSCRIPTORES.EMPRESASSC.GESTION.PLACEHOLDERSUSCRIPTOR' | translate }}
                                    </option>
                                    <option [value]="suscriptor.suscriptorId" *ngFor="let suscriptor of suscriptores">
                                        {{ suscriptor.nombreSuscriptor }}</option>
                                </select>
                                <label *ngIf="!suscriptorId.valid && (suscriptorId.dirty || suscriptorId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SUSCRIPTORES.EMPRESASSC.GESTION.REQUERIDOSUSCRIPTOR' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreEmpresa">
                                    {{ 'SUSCRIPTORES.EMPRESASSC.NAME' | translate }}</label>
                                <input class="form-control input-md" id="nombreEmpresa" name="nombreEmpresa"
                                    type="text" placeholder="{{ 'SUSCRIPTORES.EMPRESASSC.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{ 'is-invalid': !nombreEmpresa.valid && (nombreEmpresa.dirty || nombreEmpresa.touched || isSubmit) }"
                                    #nombreEmpresa="ngModel" required [(ngModel)]="FormRegistro.nombreEmpresa" />
                                <label
                                    *ngIf="!nombreEmpresa.valid && (nombreEmpresa.dirty || nombreEmpresa.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SUSCRIPTORES.EMPRESASSC.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'SUSCRIPTORES.EMPRESASSC.DESCRIPTION' | translate }}</label>
                                <textarea class="form-control"
                                    placeholder="{{ 'SUSCRIPTORES.EMPRESASSC.GESTION.PLACEHOLDERDESCRIPCION' | translate }}"
                                    name="descripcionEmpresa"
                                    [ngClass]="{
                                        'is-invalid': !descripcionEmpresa.valid && (descripcionEmpresa.dirty || descripcionEmpresa.touched || isSubmit)}"
                                    #descripcionEmpresa="ngModel" required
                                    [(ngModel)]="FormRegistro.descripcionEmpresa" rows="5">
                                    </textarea>
                                <label
                                    *ngIf="!descripcionEmpresa.valid && (descripcionEmpresa.dirty || descripcionEmpresa.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SUSCRIPTORES.EMPRESASSC.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'SUSCRIPTORES.EMPRESASSC.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoEmpresa" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoEmpresa" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
