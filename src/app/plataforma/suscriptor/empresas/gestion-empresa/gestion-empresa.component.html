<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>{{ 'PLATAFORMA.MENU' | translate }}</button>
            </div>
            <ng-container>
                <app-nav-content [navigationItems]="menuItems | async"></app-nav-content>
            </ng-container>
        </div>
    </aside>
    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'EMPRESASSC.GESTION.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'EMPRESASSC.GESTION.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                        <button type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'EMPRESASSC.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'EMPRESASSC.GESTION.CODE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoEmpresaSC"
                                    placeholder="{{ 'EMPRESASSC.GESTION.GESTION.PLACEHOLDERCODE' | translate }}"
                                    [ngClass]="{'is-invalid': !codigoEmpresaSC.valid && (codigoEmpresaSC.dirty || codigoEmpresaSC.touched || isSubmit) }"
                                    #codigoEmpresaSC="ngModel" required [(ngModel)]="FormRegistro.codigoEmpresaSC" readonly />
                                <label
                                    *ngIf="!codigoEmpresaSC.valid && (codigoEmpresaSC.dirty || codigoEmpresaSC.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PLATAFORMA.REQUIRED' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="codigoSuscriptor">{{
                                    'EMPRESASSC.GESTION.SUSCRIPTOR' |
                                    translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer;" name="codigoSuscriptor"
                                    id="codigoSuscriptor"
                                    [ngClass]="{ 'is-invalid': !codigoSuscriptor.valid && (codigoSuscriptor.dirty || codigoSuscriptor.touched || isSubmit) }"
                                    #codigoSuscriptor="ngModel" required [(ngModel)]="FormRegistro.codigoSuscriptor"
                                    (change)="onSuscriptorChangeClick($event)">
                                    <option value="" disabled>{{ 'EMPRESASSC.GESTION.PLACEHOLDERAPLICACION' | translate }}
                                    </option>
                                    <option [value]="app.codigoSuscriptor" *ngFor="let app of suscriptores">{{
                                        app.nombreSuscriptor }}</option>
                                </select>
                                <label
                                    *ngIf="!codigoSuscriptor.valid && (codigoSuscriptor.dirty || codigoSuscriptor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PLATAFORMA.REQUIRED' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreEmpresa">{{ 'EMPRESASSC.GESTION.NAME' |
                                    translate }}</label>
                                <input class="form-control form-input" id="nombreEmpresa" name="nombreEmpresa" type="text"
                                    placeholder="{{ 'EMPRESASSC.GESTION.NAMEHOLDER' | translate }}"
                                    [ngClass]="{ 'is-invalid': !nombreEmpresa.valid && (nombreEmpresa.dirty || nombreEmpresa.touched || isSubmit) }"
                                    #nombreEmpresa="ngModel" required [(ngModel)]="FormRegistro.nombreEmpresa" />
                                <label
                                    *ngIf="!nombreEmpresa.valid && (nombreEmpresa.dirty || nombreEmpresa.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PLATAFORMA.REQUIRED' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'EMPRESASSC.GESTION.DESCRIPTION' | translate }}</label>
                                <app-text-editor [toolbarType]="tipoEditorTexto"
                                    [contentHtml]="FormRegistro.descripcionEmpresa ?? ''"
                                    (contentHtmlChange)="actualizarDescripcionVersion($event)" name="descripcionEmpresa"
                                    [(ngModel)]="FormRegistro.descripcionEmpresa"
                                    [ngClass]="{'is-invalid': !descripcionEmpresa.valid && (descripcionEmpresa.dirty || descripcionEmpresa.touched || isSubmit)}"
                                    #descripcionEmpresa="ngModel" required rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionEmpresa.valid && (descripcionEmpresa.dirty || descripcionEmpresa.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PLATAFORMA.REQUIRED' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'EMPRESASSC.GESTION.LOGO' | translate }}</label>
                                <img *ngIf="selectedFileUrl" [src]="selectedFileUrl" class="image-preview">
                                <div class="file-input-wrapper">
                                    <label for="fileUploadInput" class="btn btn-primary btn-NuevoRegistro">
                                        {{ 'Seleccionar archivo' | translate }}
                                    </label>
                                    <input type="file" (change)="onFileSelectedClick($event)" accept="image/*"
                                        id="fileUploadInput" class="form-control form-input d-none"
                                        name="capturaTicket">
                                    <span class="file-name" [ngClass]="{'has-file': fileName}">
                                        {{ fileName || ('EMPRESASSC.GESTION.LOGOHOLDER' | translate) }}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'EMPRESASSC.GESTION.GESTION.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="estadoEmpresa" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoEmpresa" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="estadoEmpresa" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoEmpresa" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
