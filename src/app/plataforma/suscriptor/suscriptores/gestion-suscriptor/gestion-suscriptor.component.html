<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>

            <ng-container>
                <app-nav-content [navigationItems]="menuItems"></app-nav-content>
            </ng-container>
        </div>
    </aside>
    <div class="content-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <h5>{{ 'SUSCRIPTORES.GESTION.TITLE' | translate }}</h5>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex gap-3">
                        <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SUSCRIPTORES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SUSCRIPTORES.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card content-scroll-wrapper">
            <div class="card-header">
                <h4 *ngIf="!modoEdicion">{{ 'SUSCRIPTORES.GESTION.NEW' | translate }}</h4>
                <h4 *ngIf="modoEdicion">{{ 'SUSCRIPTORES.GESTION.UPDATE' | translate }}</h4>
            </div>
            <div class="card-body">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="identificacionSuscriptor">
                                    {{ 'SUSCRIPTORES.IDENTIFICATION' | translate }}</label>
                                <input class="form-control input-md" id="identificacionSuscriptor"
                                    name="identificacionSuscriptor" type="text"
                                    placeholder="{{ 'SUSCRIPTORES.GESTION.PLACEHOLDERIDENTIFICACION' | translate }}"
                                    [ngClass]="{ 'is-invalid': !identificacionSuscriptor.valid && (identificacionSuscriptor.dirty || identificacionSuscriptor.touched || isSubmit) }"
                                    #identificacionSuscriptor="ngModel" required
                                    [(ngModel)]="FormRegistro.identificacionSuscriptor" />
                                <label
                                    *ngIf="!identificacionSuscriptor.valid && (identificacionSuscriptor.dirty || identificacionSuscriptor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SUSCRIPTORES.GESTION.REQUERIDOIDENTIFICACION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreSuscriptor">
                                    {{ 'SUSCRIPTORES.NAME' | translate }}</label>
                                <input class="form-control input-md" id="nombreSuscriptor" name="nombreSuscriptor"
                                    type="text" placeholder="{{ 'SUSCRIPTORES.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{ 'is-invalid': !nombreSuscriptor.valid && (nombreSuscriptor.dirty || nombreSuscriptor.touched || isSubmit) }"
                                    #nombreSuscriptor="ngModel" required [(ngModel)]="FormRegistro.nombreSuscriptor" />
                                <label
                                    *ngIf="!nombreSuscriptor.valid && (nombreSuscriptor.dirty || nombreSuscriptor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SUSCRIPTORES.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'SUSCRIPTORES.DESCRIPTION' | translate }}</label>
                                <textarea class="form-control"
                                    placeholder="{{ 'SUSCRIPTORES.GESTION.PLACEHOLDERDESCRIPCION' | translate }}"
                                    name="descripcionSuscriptor"
                                    [ngClass]="{
                                        'is-invalid': !descripcionSuscriptor.valid && (descripcionSuscriptor.dirty || descripcionSuscriptor.touched || isSubmit)}"
                                    #descripcionSuscriptor="ngModel" required
                                    [(ngModel)]="FormRegistro.descripcionSuscriptor" rows="5">
                                    </textarea>
                                <label
                                    *ngIf="!descripcionSuscriptor.valid && (descripcionSuscriptor.dirty || descripcionSuscriptor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SUSCRIPTORES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'SUSCRIPTORES.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoSuscriptor" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoSuscriptor" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
