<div class="row">
    <div class="col-sm-12">
        <div class="card card-header-sticky">
            <div class="card-header">
                <h4>{{ 'SUSCRIPTORES.TITLE' | translate }}</h4>
                <hr />
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <app-breadcrumb></app-breadcrumb>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex">
                        <button type="button" (click)="OnNuevoRegistroClick()" class="btn-NuevoRegistro">
                            {{ 'SUSCRIPTORES.NEW' | translate }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table [dtOptions]="dtColumnSearchingOptions" datatable class="table row-border">
                        <thead>
                            <tr>
                                <th>{{ 'SUSCRIPTORES.NAME' | translate }}</th>
                                <th>{{ 'SUSCRIPTORES.DESCRIPTION' | translate }}</th>
                                <th>{{ 'SUSCRIPTORES.STATUS' | translate }}</th>
                                <th>{{ 'PLATAFORMA.OPTIONS' | translate }}</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let reg of registros">
                                <td>
                                    {{ reg.nombreSuscriptor }}
                                </td>
                                <td>
                                    {{ reg.descripcionSuscriptor }}
                                </td>
                                <td>
                                    {{ reg.nomEstado?? '' }}
                                </td>
                                <td style="text-align: center; width: 10%">
                                    <div class="d-flex flex-wrap gap-2">
                                        <button type="button"
                                            class="btn btn-icon btn-outline-primary d-inline-flex btnEdit"
                                            (click)="OnEditarRegistroClick(reg.suscriptorId?? 0)"
                                            title="{{ 'SUSCRIPTORES.UPDATE' | translate }}">
                                            <i class="feather icon-edit"></i>
                                        </button>
                                        <button type="button"
                                            class="btn btn-icon btn-outline-danger d-inline-flex btnDelet"
                                            (click)="OnEliminarRegistroClick(reg.suscriptorId?? 0, reg.nombreSuscriptor?? '')"
                                            data-bs-toggle="tooltip" data-bs-placement="top"
                                            title="{{ 'SUSCRIPTORES.DELETE' | translate }}">
                                            <i class="feather icon-trash-2"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <th>
                                    <input #nombreSuscriptor
                                        (keyup)="filtrarColumna(0, nombreSuscriptor.value)"
                                        type="text"
                                        placeholder="{{ 'SUSCRIPTORES.FILTER_NAME' | translate }}"
                                        name="filtro-nombre"
                                        class="form-control" />
                                </th>
                                <th>
                                    <input #descripcionSuscriptor
                                        (keyup)="filtrarColumna(1, descripcionSuscriptor.value)"
                                        type="text"
                                        placeholder="{{ 'SUSCRIPTORES.FILTER_DESCRIPTION' | translate }}"
                                        name="filtro-descripcion"
                                        class="form-control" />
                                </th>
                                <th>
                                    <input #estadoSuscriptor
                                        (keyup)="filtrarColumna(2, estadoSuscriptor.value)"
                                        type="text"
                                        placeholder="{{ 'SUSCRIPTORES.FILTRO_STATUS' | translate }}"
                                        name="filtro-estado"
                                        class="form-control" />
                                </th>
                                <th>
                                </th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
