<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>{{ 'PLATAFORMA.MENU' | translate }}</button>
            </div>
            <ng-container>
                <app-nav-content [navigationItems]="menuItems | async"></app-nav-content>
            </ng-container>
        </div>
    </aside>
    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'USUARIOS.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'USUARIOS.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                        <button *ngIf="!modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarUsuarioClick(validationForm)">
                            {{ 'USUARIOS.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarUsuarioClick(validationForm)">
                            {{ 'USUARIOS.GESTION.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUAR.GESTION.CODE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoUsuario"
                                    placeholder="{{'USUARIOS.GESTION.CODEHOLDER' | translate }}"
                                    [ngClass]="{'is-invalid': !codigoUsuario.valid && (codigoUsuario.dirty || codigoUsuario.touched || isSubmit) }"
                                    #codigoUsuario="ngModel" required [(ngModel)]="FormRegistro.codigoUsuario"
                                    readonly />
                                <label
                                    *ngIf="!codigoUsuario.valid && (codigoUsuario.dirty || codigoUsuario.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PLATAFORMA.REQUIRED | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreUsuario">{{ 'USUARIOS.GESTION.NAME' |
                                    translate }}</label>
                                <input class="form-control  form-input" id="nombreUsuario" name="nombreUsuario"
                                    type="text" placeholder="{{ 'USUARIOS.GESTION.NAMEHOLDER' | translate }}"
                                    [ngClass]="{'is-invalid': !nombreUsuario.valid && (nombreUsuario.dirty || nombreUsuario.touched || isSubmit)}"
                                    #nombreUsuario="ngModel" required [(ngModel)]="FormRegistro.nombreUsuario" />
                                <label
                                    *ngIf="!nombreUsuario.valid && (nombreUsuario.dirty || nombreUsuario.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'USUARIOS.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.IDENTIFICACION' | translate }}</label>
                                <input type="text" class="form-control form-input" name="identificacionUsuario"
                                    placeholder="{{ 'USUARIOS.GESTION.INDENTIFICACIONHOLDER' | translate }}"
                                    [ngClass]="{'is-invalid': !identificacionUsuario.valid && (identificacionUsuario.dirty || identificacionUsuario.touched || isSubmit) }"
                                    #identificacionUsuario="ngModel" required
                                    [(ngModel)]="FormRegistro.identificacionUsuario" />
                                <label
                                    *ngIf="!identificacionUsuario.valid && (identificacionUsuario.dirty || identificacionUsuario.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'USUARIOS.GESTION.REQUERIDOIDENTIFICATION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.CORREO' | translate }}</label>
                                <input type="email" class="form-control form-input" name="correoUsuario"
                                    placeholder="{{ 'USUARIOS.GESTION.CORREOHOLDER' | translate }}"
                                    [ngClass]="{'is-invalid': !correoUsuario.valid && (correoUsuario.dirty || correoUsuario.touched || isSubmit) }"
                                    #correoUsuario="ngModel" required [(ngModel)]="FormRegistro.correoUsuario" />
                                <label
                                    *ngIf="!correoUsuario.valid && (correoUsuario.dirty || correoUsuario.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'USUARIOS.GESTION.REQUERIDOCORREO' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.USERNAME' | translate }}</label>
                                <input type="text" class="form-control form-input" name="userNameUsuario"
                                    placeholder="{{ 'USUARIOS.GESTION.USERNAMEHOLDER' | translate }}"
                                    [ngClass]="{'is-invalid': !userNameUsuario.valid && (userNameUsuario.dirty || userNameUsuario.touched || isSubmit) }"
                                    #userNameUsuario="ngModel" required [(ngModel)]="FormRegistro.userNameUsuario" />
                                <label
                                    *ngIf="!userNameUsuario.valid && (userNameUsuario.dirty || userNameUsuario.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'USUARIOS.GESTION.REQUERIDOUSERNAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.CLAVEACTUAL' | translate }}</label>
                                <input type="text" class="form-control form-input" name="claveUsuario"
                                    (ngModelChange)="validarClaveActual($event)"
                                    placeholder="{{ 'USUARIOS.GESTION.CLAVEACTUALHOLDER' | translate }}"
                                    #claveUsuario="ngModel" required [(ngModel)]="FormRegistro.claveUsuario" />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.CLAVENEW' | translate }}</label>
                                <input type="text" class="form-control form-input" name="claveNew"
                                    [disabled]="isClaveActual"
                                    placeholder="{{ 'USUARIOS.GESTION.CLAVENEWHOLDER' | translate }}"
                                    #claveNew="ngModel" required [(ngModel)]="FormRegistro.claveNew" />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.CLAVECONFIRM' | translate }}</label>
                                <input type="text" class="form-control form-input" name="claveConfirm"
                                    [disabled]="isClaveActual"
                                    placeholder="{{ 'USUARIOS.GESTION.CLAVECONFIRMHOLDER' | translate }}"
                                    #claveConfirm="ngModel" required [(ngModel)]="FormRegistro.claveConfirm" />
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.DESCRIPTION' | translate }}</label>
                                <app-text-editor [toolbarType]="tipoEditorTexto"
                                    [contentHtml]="FormRegistro.descripcionUsuario ?? ''"
                                    (contentHtmlChange)="actualizarDescripcionRegistro($event)"
                                    name="descripcionUsuario" [(ngModel)]="FormRegistro.descripcionUsuario"
                                    [ngClass]="{'is-invalid': !descripcionUsuario.valid && (descripcionUsuario.dirty || descripcionUsuario.touched || isSubmit)}"
                                    #descripcionUsuario="ngModel" required rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionUsuario.valid && (descripcionUsuario.dirty || descripcionUsuario.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'USUARIOS.GESTION.REQUERIDODESCRIPTION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.FOTO' | translate }}</label>
                                <img *ngIf="selectedFileUrl" [src]="selectedFileUrl" class="avatar-preview">
                                <div class="file-input-wrapper">
                                    <label for="fileUploadInput" class="btn btn-primary btn-NuevoRegistro">
                                        {{ 'Seleccionar archivo' | translate }}
                                    </label>
                                    <input type="file" (change)="onFileSelectedClick($event)" accept="image/*"
                                        id="fileUploadInput" class="form-control form-input d-none" name="fotoUsuario">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="estadoUsuario" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoUsuario">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="estadoUsuario" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoUsuario">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12" [hidden]="isUserRole">
                            <div class="form-group">
                                <label class="form-label">{{ 'USUARIOS.GESTION.ADMINISTRADOR' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="usuarioAdministrador" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.usuarioAdministrador">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.POSITIVO' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="usuarioAdministrador" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.usuarioAdministrador" selected>
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.NEGATIVO' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-12">
                                <label class="form-label">{{ 'USUARIOS.ROLES.GESTION.TIPOROLE' | translate }}</label>
                                <div class="radio-buttons d-flex justify-content-center gap-4">
                                    <label class="radio-button" [ngClass]="{'cursor-blocked': modoEdicion}">
                                        <input name="tipoRol" type="radio" value="plataforma"
                                            [(ngModel)]="tipoRolSeleccionado"
                                            (change)="consultarRoles()">
                                        <div class="radio-circle"></div>
                                        <span class="radio-label">{{ 'USUARIOS.ROLES.GESTION.ROLPLATAFORMA' | translate
                                            }}</span>
                                    </label>
                                    <label class="radio-button" [ngClass]="{'cursor-blocked': modoEdicion}">
                                        <input name="tipoRol" type="radio" value="suscriptor"
                                            [(ngModel)]="tipoRolSeleccionado"
                                            (change)="consultarRoles()">
                                        <div class="radio-circle"></div>
                                        <span class="radio-label">{{ 'USUARIOS.ROLES.GESTION.ROLSUSCRIPTOR' | translate
                                            }}</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12" *ngIf="roles && roles.length > 0">
                            <div class="text-center flex flex-col justify-center">
                                <br />
                                <h4 class="titles">{{ 'USUARIOS.GESTION.ROLES' | translate }}</h4>
                                <h6 class="sub-titles">{{ 'USUARIOS.GESTION.ROLESTEXT' | translate }}</h6>

                                <button type="button" class="btn btn-primary btn-NuevoRegistro transition"
                                    (click)="btnAsociarTodosRolesClick()" [disabled]="!tipoRolSeleccionado">
                                    {{ 'PLATAFORMA.ALLDATA' | translate }}
                                </button>
                                <br><br>
                            </div>
                            <div class="col-md-12" *ngIf="roles && roles.length > 0">
                                <div class="row">
                                    <div class="col-md-6 mb-2" *ngFor="let role of roles; let i = index">
                                        <div class="form-check custom-check-form">
                                            <input class="form-check-input" type="checkbox"
                                                [(ngModel)]="role.checked"
                                                (change)="toggleRolSeleccionado(role)"
                                                [disabled]="!tipoRolSeleccionado" [name]="'roleCheck_' + i"
                                                [id]="'role_' + i">

                                            <label class="form-check-label text-white ml-2" [for]="'role_' + i"
                                                style="cursor: pointer;">
                                                {{ role.nombreRole }}
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
