<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
  <aside class="aside-left">
    <div class="card">
      <div class="nav-tabs-custom">
        <button>{{ 'PLATAFORMA.MENU' | translate }}</button>
      </div>
      <ng-container><app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content></ng-container>
    </div>
  </aside>

  <div class="form-area">
    <div class="card">
      <div class="card-header card-header-sticky">
        <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
          <div class="d-flex align-items-center">
            <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'TIPOSGALERIA.NEW' | translate }}</h4>
            <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'TIPOSGALERIA.UPDATE' | translate }}</h4>
          </div>
          <div class="d-flex">
            <button type="button" class="btn btn-primary btn-NuevoRegistro" (click)="btnRegresarClick()">
              {{ 'PLATAFORMA.REGRESAR' | translate }} <i class="feather icon-arrow-left ms-2"></i>
            </button>
            <button type="button" class="btn btn-primary btn-NuevoRegistro" (click)="btnGestionarTipoClick(validationForm)">
              {{ modoEdicion ? ('TIPOSGALERIA.UPDATE' | translate) : ('TIPOSGALERIA.CREATE' | translate) }}
              <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="card-body form-scroll-wrapper">
        <form #validationForm="ngForm" class="editForm" novalidate>
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label">{{ 'TIPOSGALERIA.CODE' | translate }}</label>
                <input
                  type="text"
                  class="form-control form-input"
                  name="codigoTipo"
                  [ngClass]="{ 'is-invalid': !codigoTipo.valid && (codigoTipo.dirty || codigoTipo.touched || isSubmit) }"
                  #codigoTipo="ngModel"
                  required
                  [(ngModel)]="FormRegistro.codigoTipo"
                  readonly
                />
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label class="form-control-label" for="nombreTipo">{{ 'TIPOSGALERIA.NAME' | translate }}</label>
                <input
                  class="form-control form-input"
                  id="nombreTipo"
                  name="nombreTipo"
                  type="text"
                  placeholder="{{ 'TIPOSGALERIA.NAMEHOLDER' | translate }}"
                  [ngClass]="{ 'is-invalid': !nombreTipo.valid && (nombreTipo.dirty || nombreTipo.touched || isSubmit) }"
                  #nombreTipo="ngModel"
                  required
                  [(ngModel)]="FormRegistro.nombreTipo"
                />
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label class="form-label">{{ 'TIPOSGALERIA.DESCRIPTION' | translate }}</label>
                <app-text-editor
                  [toolbarType]="tipoEditorTexto"
                  [contentHtml]="FormRegistro.descripcionTipo ?? ''"
                  (contentHtmlChange)="actualizarDescripcionVersion($event)"
                  name="descripcionTipo"
                  [(ngModel)]="FormRegistro.descripcionTipo"
                  [ngClass]="{ 'is-invalid': !descripcionTipo.valid && (descripcionTipo.dirty || descripcionTipo.touched || isSubmit) }"
                  #descripcionTipo="ngModel"
                  required
                  rows="5"
                ></app-text-editor>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label class="form-label">{{ 'TIPOSGALERIA.STATUS' | translate }}</label>
                <div class="radio-buttons">
                  <label class="radio-button">
                    <input name="estadoTipo" type="radio" [value]="true" [(ngModel)]="FormRegistro.estadoTipo" />
                    <div class="radio-circle"></div>
                    <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                  </label>
                  <label class="radio-button">
                    <input name="estadoTipo" type="radio" [value]="false" [(ngModel)]="FormRegistro.estadoTipo" />
                    <div class="radio-circle"></div>
                    <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
