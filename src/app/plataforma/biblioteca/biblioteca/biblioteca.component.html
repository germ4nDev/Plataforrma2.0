<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button [class.active]="activeTab === 'menu'" (click)="activeTab = 'menu'">
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
                <button [class.active]="activeTab === 'filters'" (click)="activeTab = 'filters'" *ngIf="hasFiltersSlot">
                    {{ 'PLATAFORMA.FILTERS' | translate }}
                </button>
            </div>

            <ng-container *ngIf="activeTab === 'menu'">
                <app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content>
            </ng-container>

            <ng-container *ngIf="activeTab === 'filters'">
                <div class="p-3 filtros-scroll-wrapper">
                    <h6 class="filtros-title">{{ 'BIBLIOTECA.FILTROS.TITULO' | translate }}</h6>

                    <div class="filtro">
                        <small>{{ 'BIBLIOTECA.FILTROS.FILTROCODIGO' | translate }}</small>
                        <select (change)="onFiltroCodigoChangeClick($event)" class="form-control form-select">
                            <option value="todos">{{ 'PLATAFORMA.FILTROTODOS' | translate }}</option>
                            <option [value]="lib.codigoBiblioteca" *ngFor="let lib of bibliotecas">
                                {{ lib.codigoBiblioteca }}
                            </option>
                        </select>
                    </div>

                    <div class="filtro">
                        <small>{{ 'BIBLIOTECA.FILTROS.FILTRONOMBRE' | translate }}</small>
                        <select (change)="onFiltroNombreChangeClick($event)" class="form-control form-select">
                            <option value="todos">{{ 'PLATAFORMA.FILTROTODOS' | translate }}</option>
                            <option [value]="lib.nombreBiblioteca" *ngFor="let lib of bibliotecas">
                                {{ lib.nombreBiblioteca }}
                            </option>
                        </select>
                    </div>

                    <div class="filtro">
                        <small>{{ 'BIBLIOTECA.FILTROS.FILTRODECRIPCION' | translate }}</small>
                        <input type="text" (keyup)="onFiltroDescripcionChangeClick($event)" class="form-control form-input"
                            placeholder="{{ 'BIBLIOTECA.FILTROS.DESCRIPCIONCHOLDER' | translate }}" />
                    </div>

                    <div class="filtro">
                        <small>{{ 'BIBLIOTECA.FILTROS.FILTROESTADO' | translate }}</small>
                        <select (change)="onFiltroEstadoChangeClick($event)" class="form-control form-select">
                            <option value="todos">{{ 'PLATAFORMA.FILTROTODOS' | translate }}</option>
                            <option value="true">{{ 'PLATAFORMA.ACTIVE' | translate }}</option>
                            <option value="false">{{ 'PLATAFORMA.INACTIVE' | translate }}</option>
                        </select>
                    </div>
                </div>
            </ng-container>
        </div>
    </aside>

    <div class="content-area">
        <div class="card card-table content-scroll-wrapper">
            <div class="card-body">
                <ng-container *ngIf="bibliotecaFiltrada$ | async as dataFiltrada">
                    <app-data-table
                        [data]="dataFiltrada"
                        [idField]="'codigoBiblioteca'"
                        [tableTitle]="'BIBLIOTECA.TITLE' | translate"
                        [metadataColumns]="columnasBiblioteca"
                        [metadataDetailColumns]="columnasDetailRegistros"
                        [showDetail]="true"
                        [showActions]="true"
                        [showNewButton]="true"
                        [showViewButton]="false"
                        [showEditButton]="true"
                        [showDeleteButton]="true"
                        [newButtonLabel]="'BIBLIOTECA.NEW' | translate"
                        [exportLabel]="'PLATAFORMA.EXCEL' | translate"
                        (newRecord)="OnNuevaBibliotecaClick()"
                        (editRecord)="OnEditarBibliotecaClick($event)"
                        (deleteRecord)="OnEliminarBibliotecaClick($event)">
                    </app-data-table>
                </ng-container>
            </div>
        </div>
    </div>
</div>
