<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
  <aside class="aside-left">
    <div class="card">
      <div class="nav-tabs-custom">
        <button>{{ 'PLATAFORMA.MENU' | translate }}</button>
      </div>
      <ng-container>
        <app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content>
      </ng-container>
    </div>
  </aside>

  <div class="form-area">
    <div class="card">
      <div class="card-header card-header-sticky">
        <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
          <div class="d-flex align-items-center">
            <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'BIBLIOTECA.NEW' | translate }}</h4>
            <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'BIBLIOTECA.UPDATE' | translate }}</h4>
          </div>
          <div class="d-flex">
            <button type="button" class="btn btn-primary btn-NuevoRegistro" (click)="btnRegresarClick()">
              {{ 'PLATAFORMA.REGRESAR' | translate }}
              <i class="feather icon-arrow-left ms-2"></i>
            </button>
            <button
              *ngIf="!modoEdicion"
              type="button"
              class="btn btn-primary btn-NuevoRegistro"
              (click)="btnGestionarBibliotecaClick(validationForm)"
            >
              {{ 'BIBLIOTECA.CREATE' | translate }}
              <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
            </button>
            <button
              *ngIf="modoEdicion"
              type="button"
              class="btn btn-primary btn-NuevoRegistro"
              (click)="btnGestionarBibliotecaClick(validationForm)"
            >
              {{ 'BIBLIOTECA.UPDATE' | translate }}
              <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="card-body form-scroll-wrapper">
        <form #validationForm="ngForm" class="editForm" novalidate>
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label">{{ 'BIBLIOTECA.CODE' | translate }}</label>
                <input
                  type="text"
                  class="form-control form-input"
                  name="codigoBiblioteca"
                  placeholder="Código de la Biblioteca"
                  [ngClass]="{ 'is-invalid': !codigoBiblioteca.valid && (codigoBiblioteca.dirty || codigoBiblioteca.touched || isSubmit) }"
                  #codigoBiblioteca="ngModel"
                  required
                  [(ngModel)]="FormRegistro.codigoBiblioteca"
                  readonly
                />
                <label
                  *ngIf="!codigoBiblioteca.valid && (codigoBiblioteca.dirty || codigoBiblioteca.touched || isSubmit)"
                  class="error jquery-validation-error small form-text invalid-feedback"
                >
                  {{ 'BIBLIOTECA.CODEHOLDER' | translate }}
                </label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label class="form-control-label" for="nombreBiblioteca">{{ 'BIBLIOTECA.NAME' | translate }}</label>
                <input
                  class="form-control form-input"
                  id="nombreBiblioteca"
                  name="nombreBiblioteca"
                  type="text"
                  placeholder="{{ 'BIBLIOTECA.NAME' | translate }}"
                  [ngClass]="{ 'is-invalid': !nombreBiblioteca.valid && (nombreBiblioteca.dirty || nombreBiblioteca.touched || isSubmit) }"
                  #nombreBiblioteca="ngModel"
                  required
                  [(ngModel)]="FormRegistro.nombreBiblioteca"
                />
                <label
                  *ngIf="!nombreBiblioteca.valid && (nombreBiblioteca.dirty || nombreBiblioteca.touched || isSubmit)"
                  class="error jquery-validation-error small form-text invalid-feedback"
                >
                  {{ 'BIBLIOTECA.NAMEHOLDER' | translate }}
                </label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label class="form-control-label" for="codigoAplicacion"> {{ 'BIBLIOTECA.GESTION.APLICACION' | translate }}</label>
                <select
                  class="form-control form-input"
                  style="cursor: pointer"
                  name="codigoAplicacion"
                  id="codigoAplicacion"
                  [ngClass]="{ 'is-invalid': !codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit) }"
                  #codigoAplicacion="ngModel"
                  required
                  [(ngModel)]="FormRegistro.codigoAplicacion"
                  (change)="onAplicacionChangeClick($event)"
                >
                  <option value>{{ 'BIBLIOTECA.GESTION.PLACEHOLDERAPLICACION' | translate }} </option>
                  <option [value]="app.codigoAplicacion" *ngFor="let app of aplicaciones"> {{ app.nombreAplicacion }}</option>
                </select>
                <label
                  *ngIf="!codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit)"
                  class="error jquery-validation-error small form-text invalid-feedback"
                >
                  {{ 'BIBLIOTECA.GESTION.REQUERIDOAPLICACION' | translate }}
                </label>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label class="form-label">{{ 'BIBLIOTECA.DESCRIPTION' | translate }}</label>
                <app-text-editor
                  [toolbarType]="tipoEditorTexto"
                  [contentHtml]="FormRegistro.descripcionBiblioteca ?? ''"
                  (contentHtmlChange)="actualizarDescripcionVersion($event)"
                  name="descripcionBiblioteca"
                  [(ngModel)]="FormRegistro.descripcionBiblioteca"
                  [ngClass]="{
                    'is-invalid': !descripcionBiblioteca.valid && (descripcionBiblioteca.dirty || descripcionBiblioteca.touched || isSubmit)
                  }"
                  #descripcionBiblioteca="ngModel"
                  required
                  rows="5"
                >
                </app-text-editor>
                <label
                  *ngIf="!descripcionBiblioteca.valid && (descripcionBiblioteca.dirty || descripcionBiblioteca.touched || isSubmit)"
                  class="error jquery-validation-error small form-text invalid-feedback"
                >
                  {{ 'BIBLIOTECA.DESCRIPCIONHOLDER' | translate }}
                </label>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label class="form-label">{{ 'APLICACIONES.GESTION.FOTO' | translate }}</label>
                <img *ngIf="selectedFileUrl" [src]="selectedFileUrl" class="image-preview" />
                <div class="file-input-wrapper">
                  <label for="fileUploadInput" class="btn btn-primary btn-NuevoRegistro">
                    {{ 'Seleccionar archivo' | translate }}
                  </label>
                  <input
                    type="file"
                    (change)="onFileSelectedClick($event)"
                    accept="image/*"
                    id="fileUploadInput"
                    class="form-control form-input d-none"
                    name="fotoUsuario"
                  />
                  <span class="file-name" [ngClass]="{ 'has-file': fileName }">
                    <!-- {{ fileName || ('APLICACIONES.GESTION.FOTOHOLDER' | translate) }} -->
                  </span>
                </div>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label class="form-label">{{ 'BIBLIOTECA.STATUS' | translate }}</label>
                <div class="radio-buttons">
                  <label class="radio-button">
                    <input name="estadoBiblioteca" type="radio" [value]="true" [(ngModel)]="FormRegistro.estadoBiblioteca" />
                    <div class="radio-circle"></div>
                    <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                  </label>
                  <label class="radio-button">
                    <input name="estadoBiblioteca" type="radio" [value]="false" [(ngModel)]="FormRegistro.estadoBiblioteca" />
                    <div class="radio-circle"></div>
                    <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
