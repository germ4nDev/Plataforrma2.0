<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
  <aside class="aside-left">
    <div class="card">
      <div class="nav-tabs-custom">
        <button>{{ 'PLATAFORMA.MENU' | translate }}</button>
      </div>
      <ng-container><app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content></ng-container>
    </div>
  </aside>

  <div class="form-area">
    <div class="card">
      <div class="card-header card-header-sticky">
        <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
          <div class="d-flex align-items-center">
            <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'FORMATOSGALERIA.NEW' | translate }}</h4>
            <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'FORMATOSGALERIA.UPDATE' | translate }}</h4>
          </div>
          <div class="d-flex">
            <button type="button" class="btn btn-primary btn-NuevoRegistro" (click)="btnRegresarClick()">
              {{ 'PLATAFORMA.REGRESAR' | translate }} <i class="feather icon-arrow-left ms-2"></i>
            </button>
            <button type="button" class="btn btn-primary btn-NuevoRegistro" (click)="btnGestionarFormatoClick(validationForm)">
              {{ modoEdicion ? ('FORMATOSGALERIA.UPDATE' | translate) : ('FORMATOSGALERIA.CREATE' | translate) }}
              <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="card-body form-scroll-wrapper">
        <form #validationForm="ngForm" class="editForm" novalidate>
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label">{{ 'FORMATOSGALERIA.CODE' | translate }}</label>
                <input
                  type="text"
                  class="form-control form-input"
                  name="codigoFormato"
                  [ngClass]="{
                    'is-invalid': !codigoFormato.valid && (codigoFormato.dirty || codigoFormato.touched || isSubmit)
                  }"
                  #codigoFormato="ngModel"
                  required
                  [(ngModel)]="FormRegistro.codigoFormato"
                  readonly
                />
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label class="form-control-label" for="nombreFormato">{{ 'FORMATOSGALERIA.NAME' | translate }}</label>
                <input
                  class="form-control form-input"
                  id="nombreFormato"
                  name="nombreFormato"
                  type="text"
                  placeholder="{{ 'FORMATOSGALERIA.NAMEHOLDER' | translate }}"
                  [ngClass]="{
                    'is-invalid': !nombreFormato.valid && (nombreFormato.dirty || nombreFormato.touched || isSubmit)
                  }"
                  #nombreFormato="ngModel"
                  required
                  [(ngModel)]="FormRegistro.nombreFormato"
                />
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label class="form-label">{{ 'FORMATOSGALERIA.DESCRIPTION' | translate }}</label>
                <app-text-editor
                  [toolbarType]="tipoEditorTexto"
                  [contentHtml]="FormRegistro.descripcionFormato ?? ''"
                  (contentHtmlChange)="actualizarDescripcionVersion($event)"
                  name="descripcionFormato"
                  [(ngModel)]="FormRegistro.descripcionFormato"
                  [ngClass]="{
                    'is-invalid':
                      !descripcionFormato.valid &&
                      (descripcionFormato.dirty || descripcionFormato.touched || isSubmit)
                  }"
                  #descripcionFormato="ngModel"
                  required
                  rows="5"
                ></app-text-editor>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label class="form-label">{{ 'FORMATOSGALERIA.STATUS' | translate }}</label>
                <div class="radio-buttons">
                  <label class="radio-button">
                    <input name="estadoFormato" type="radio" [value]="true" [(ngModel)]="FormRegistro.estadoFormato" />
                    <div class="radio-circle"></div>
                    <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                  </label>
                  <label class="radio-button">
                    <input name="estadoFormato" type="radio" [value]="false" [(ngModel)]="FormRegistro.estadoFormato" />
                    <div class="radio-circle"></div>
                    <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
