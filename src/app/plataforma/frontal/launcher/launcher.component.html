<div class="row">
    <div class="col-sm-12">
      <app-card cardTitle="Basic Component">
        <h5>Suites de la Aplicación {{ nomAplicacion }}</h5>
        <hr />
        <div class="row">
          <div class="col-md-6">
            <form action="">
                <div *ngFor="let suite of suites">
                    <button type="submit" class="btn btn-secondary mb-2" (click)="ingresaSuiteaplicacion(suite)">Ingresar a {{ suite.nombreSuite }}</button>
                </div>
            </form>
          </div>
        </div>
      </app-card>
    </div>
  </div>
