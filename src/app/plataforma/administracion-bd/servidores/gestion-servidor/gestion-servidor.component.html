<div class="row">
    <div class="col-sm-12">
        <div class="card card-header-sticky">
            <div class="card-header">
                <h4>{{ 'SERVIDORES.GESTION.TITLE' | translate }}</h4>
                <hr />
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <app-breadcrumb></app-breadcrumb>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex gap-3">
                        <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SERVIDORES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SERVIDORES.GESTION.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <h4 *ngIf="!modoEdicion">{{ 'SERVIDORES.NEW' | translate }}</h4>
                <h4 *ngIf="modoEdicion">{{ 'SERVIDORES.UPDATE' | translate }}</h4>
            </div>
            <div class="card-body">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreServidor">{{ 'SERVIDORES.GESTION.NAME' |
                                    translate }}</label>
                                <input class="form-control input-md" id="nombreServidor" name="nombreServidor" type="text"
                                    placeholder="{{ 'SERVIDORES.GESTION.NAMEHOLDER' | translate }}"
                                    [ngClass]="{ 'is-invalid': !nombreServidor.valid && (nombreServidor.dirty || nombreServidor.touched || isSubmit) }"
                                    #nombreServidor="ngModel" required [(ngModel)]="FormRegistro.nombreServidor" />
                                <label *ngIf="!nombreServidor.valid && (nombreServidor.dirty || nombreServidor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SERVIDORES.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="rutaServidor">{{ 'SERVIDORES.GESTION.RUTA' |
                                    translate }}</label>
                                <input class="form-control input-md" id="rutaServidor" name="rutaServidor" type="text"
                                    placeholder="{{ 'SERVIDORES.GESTION.RUTAHOLDER' | translate }}"
                                    [ngClass]="{ 'is-invalid': !rutaServidor.valid && (rutaServidor.dirty || rutaServidor.touched || isSubmit) }"
                                    #rutaServidor="ngModel" required [(ngModel)]="FormRegistro.rutaServidor" />
                                <label *ngIf="!rutaServidor.valid && (rutaServidor.dirty || rutaServidor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SERVIDORES.GESTION.REQUERIDORUTA' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'SERVIDORES.GESTION.DESCRIPTION' | translate }}</label>
                                <textarea class="form-control"
                                    placeholder="{{ 'SERVIDORES.GESTION.DESCRIPTIONHOLDER' | translate }}"
                                    name="descripcionServidor" [ngClass]="{
                                    'is-invalid': !descripcionServidor.valid && (descripcionServidor.dirty || descripcionServidor.touched || isSubmit)}"
                                    #descripcionServidor="ngModel" required [(ngModel)]="FormRegistro.descripcionServidor" rows="5">
                                </textarea>
                                <label
                                    *ngIf="!descripcionServidor.valid && (descripcionServidor.dirty || descripcionServidor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SERVIDORES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'SERVIDORES.GESTION.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoServidor" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label><br />
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoServidor" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
