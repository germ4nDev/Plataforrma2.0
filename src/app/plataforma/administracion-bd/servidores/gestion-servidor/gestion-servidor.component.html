<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>

            <ng-container>
                <app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content>
            </ng-container>
        </div>
    </aside>

    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'CONEXIONES.SERVIDORES.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'CONEXIONES.SERVIDORES.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button *ngIf="!modoEdicion" type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'CONEXIONES.SERVIDORES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'CONEXIONES.SERVIDORES.GESTION.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreServidor">{{ 'CONEXIONES.SERVIDORES.GESTION.NAME' |
                                    translate }}</label>
                                <input class="form-control form-input" id="nombreServidor" name="nombreServidor"
                                    type="text" placeholder="{{ 'CONEXIONES.SERVIDORES.GESTION.NAMEHOLDER' | translate }}"
                                    [ngClass]="{ 'is-invalid': !nombreServidor.valid && (nombreServidor.dirty || nombreServidor.touched || isSubmit) }"
                                    #nombreServidor="ngModel" required [(ngModel)]="FormRegistro.nombreServidor" />
                                <label
                                    *ngIf="!nombreServidor.valid && (nombreServidor.dirty || nombreServidor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'CONEXIONES.SERVIDORES.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'CONEXIONES.SERVIDORES.GESTION.CODE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoServidor"
                                    placeholder="Código del Servidor"
                                    [ngClass]="{'is-invalid': !codigoServidor.valid && (codigoServidor.dirty || codigoServidor.touched || isSubmit) }"
                                    #codigoServidor="ngModel" required [(ngModel)]="FormRegistro.codigoServidor"
                                    readonly />
                                <label
                                    *ngIf="!codigoServidor.valid && (codigoServidor.dirty || codigoServidor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'CONEXIONES.SERVIDORES.GESTION.CODEHOLDER' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="rutaServidor">{{ 'CONEXIONES.SERVIDORES.GESTION.RUTA' |
                                    translate }}</label>
                                <input class="form-control form-input" id="rutaServidor" name="rutaServidor" type="text"
                                    placeholder="{{ 'CONEXIONES.SERVIDORES.GESTION.RUTAHOLDER' | translate }}"
                                    [ngClass]="{ 'is-invalid': !rutaServidor.valid && (rutaServidor.dirty || rutaServidor.touched || isSubmit) }"
                                    #rutaServidor="ngModel" required [(ngModel)]="FormRegistro.rutaServidor" />
                                <label
                                    *ngIf="!rutaServidor.valid && (rutaServidor.dirty || rutaServidor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'CONEXIONES.SERVIDORES.GESTION.REQUERIDORUTA' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'CONEXIONES.SERVIDORES.GESTION.DESCRIPTION' | translate }}</label>
                                <app-text-editor
                                    [toolbarType]="tipoEditorTexto"
                                    [contentHtml]="FormRegistro.descripcionServidor ?? ''"
                                    (contentHtmlChange)="actualizarDescripcionVersion($event)"
                                    name="descripcionServidor"
                                    [(ngModel)]="FormRegistro.descripcionServidor"
                                    [ngClass]="{'is-invalid': !descripcionServidor.valid && (descripcionServidor.dirty || descripcionServidor.touched || isSubmit)}"
                                    #descripcionServidor="ngModel"
                                    required
                                    rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionServidor.valid && (descripcionServidor.dirty || descripcionServidor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'CONEXIONES.SERVIDORES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'CONEXIONES.SERVIDORES.GESTION.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoServidor" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label><br />
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoServidor" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
