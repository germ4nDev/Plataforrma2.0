<div class="row">
    <div class="col-sm-12">
        <div class="card card-header-sticky">
            <div class="card-header">
                <h4>{{ 'ROLES.GESTION.TITLE' | translate }}</h4>
                <hr />
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <app-breadcrumb></app-breadcrumb>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex gap-3">
                        <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'ROLES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'ROLES.GESTION.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <h4 *ngIf="!modoEdicion">{{ 'ROLES.GESTION.NEW' | translate }}</h4>
                <h4 *ngIf="modoEdicion">{{ 'ROLES.GESTION.UPDATE' | translate }}</h4>
            </div>
            <div class="card-body">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="usuarioId">{{
                                    'ROLES.GESTION.APLICACION' |
                                    translate }}</label>
                                <select class="form-control input-md" name="usuarioId" id="usuarioId"
                                    [ngClass]="{ 'is-invalid': !usuarioId.valid && (usuarioId.dirty || usuarioId.touched || isSubmit) }"
                                    #usuarioId="ngModel" required [(ngModel)]="FormRegistro.usuarioId">
                                    <option value="">{{ 'ROLES.GESTION.APLICACIONHOLDER' | translate }}</option>
                                    <option [value]="user.usuarioId" *ngFor="let user of usuarios">{{ user.nombreUsuario
                                        }}</option>
                                </select>
                                <label *ngIf="!usuarioId.valid && (usuarioId.dirty || usuarioId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PLATAFORMA.REQUIRED' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="aplicacionId">{{
                                    'ROLES.GESTION.APLICACION' |
                                    translate }}</label>
                                <select class="form-control input-md" name="aplicacionId" id="aplicacionId"
                                    [ngClass]="{ 'is-invalid': !aplicacionId.valid && (aplicacionId.dirty || aplicacionId.touched || isSubmit) }"
                                    #aplicacionId="ngModel" required [(ngModel)]="FormRegistro.aplicacionId"
                                    (change)="onAplicacionchangeClick($event)">
                                    <option value="">{{ 'ROLES.GESTION.APLICACIONHOLDER' | translate }}</option>
                                    <option [value]="app.aplicacionId" *ngFor="let app of aplicaciones">{{
                                        app.nombreAplicacion }}</option>
                                </select>
                                <label
                                    *ngIf="!aplicacionId.valid && (aplicacionId.dirty || aplicacionId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PLATAFORMA.REQUIRED' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreRole">{{ 'ROLES.GESTION.NAME' |
                                    translate }}</label>
                                <div *ngFor="let role of rolesAplicacion">
                                    <label>
                                        <input class="radio-button" type="checkbox" [value]="role.roleId"
                                            (change)="onSeleccionarRegistroChange($event, role)"
                                            [checked]="role.checked" />
                                        {{ role.nombreRole }}
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'ROLES.GESTION.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoUsuarioRole" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label><br />
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoUsuarioRole" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
