<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>
            <ng-container>
                <app-nav-content [navigationItems]="menuItems"></app-nav-content>
            </ng-container>
        </div>
    </aside>
    <div class="content-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <h5>{{ 'ENLACES.GESTION.TITLE' | translate }}</h5>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex gap-3">
                        <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'ENLACES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'ENLACES.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card content-scroll-wrapper">
            <div class="card-header">
                <h4 *ngIf="!modoEdicion">{{ 'ENLACES.NEW' | translate }}</h4>
                <h4 *ngIf="modoEdicion">{{ 'ENLACES.UPDATE' | translate }}</h4>
            </div>
            <div class="card-body">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="sitioId">
                                    {{ 'ENLACES.GESTION.SITIOS' | translate }}</label>
                                <select class="form-control input-md" name="sitioId" id="sitioId"
                                    [ngClass]="{ 'is-invalid': !sitioId.valid && (sitioId.dirty || sitioId.touched || isSubmit) }"
                                    #sitioId="ngModel" required [(ngModel)]="FormRegistro.sitioId"
                                    (change)="onSitiochangeClick($event)">
                                    <option value="" disabled>{{ 'ENLACES.GESTION.PLACEHOLDERSITIOS' | translate }}
                                    </option>
                                    <option [value]="sitio.sitioId" *ngFor="let sitio of sitios">
                                        {{ sitio.nombreSitio }}</option>
                                </select>
                                <label *ngIf="!sitioId.valid && (sitioId.dirty || sitioId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'ENLACES.GESTION.REQUERIDOSITIOS' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreEnlace">{{ 'ENLACES.NAME' | translate
                                    }}</label>
                                <input class="form-control input-md" id="nombreEnlace" name="nombreEnlace" type="text"
                                    placeholder="{{ 'ENLACES.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{'is-invalid': !nombreEnlace.valid && (nombreEnlace.dirty || nombreEnlace.touched || isSubmit)}"
                                    #nombreEnlace="ngModel" required [(ngModel)]="FormRegistro.nombreEnlace" />
                                <label
                                    *ngIf="!nombreEnlace.valid && (nombreEnlace.dirty || nombreEnlace.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'ENLACES.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'ENLACES.RUTA' | translate }}</label>
                                <input type="text" class="form-control" name="rutaEnlace"
                                    placeholder="{{ 'ENLACES.GESTION.PLACEHOLDERRUTA' | translate }}"
                                    [ngClass]="{'is-invalid': !rutaEnlace.valid && (rutaEnlace.dirty || rutaEnlace.touched || isSubmit) }"
                                    #rutaEnlace="ngModel" required [(ngModel)]="FormRegistro.rutaEnlace" />
                                <label *ngIf="!rutaEnlace.valid && (rutaEnlace.dirty || rutaEnlace.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'ENLACES.GESTION.REQUERIDORUTA' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'ENLACES.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoEnlace">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoEnlace">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'ENLACES.DESCRIPTION' | translate }}</label>
                                <textarea class="form-control"
                                    placeholder="{{ 'ENLACES.GESTION.PLACEHOLDERDESCRIPCION' | translate }}"
                                    name="descripcionEnlace"
                                    [ngClass]="{'is-invalid': !descripcionEnlace.valid && (descripcionEnlace.dirty || descripcionEnlace.touched || isSubmit)}"
                                    #descripcionEnlace="ngModel" required [(ngModel)]="FormRegistro.descripcionEnlace"
                                    rows="5">
                                </textarea>
                                <label
                                    *ngIf="!descripcionEnlace.valid && (descripcionEnlace.dirty || descripcionEnlace.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'ENLACES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
