<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>

            <ng-container>
                <app-nav-content [navigationItems]="menuItems | async"></app-nav-content>
            </ng-container>
        </div>
    </aside>

    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'SITIOS.ENLACES.GESTION.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'SITIOS.ENLACES.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button *ngIf="!modoEdicion" type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SITIOS.ENLACES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'SITIOS.ENLACES.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="sitioId">
                                    {{ 'SITIOS.ENLACES.GESTION.SITIOS' | translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer;" name="sitioId" id="sitioId"
                                    [ngClass]="{ 'is-invalid': !sitioId.valid && (sitioId.dirty || sitioId.touched || isSubmit) }"
                                    #sitioId="ngModel" required [(ngModel)]="FormRegistro.sitioId"
                                    (change)="onSitiochangeClick($event)">
                                    <option value="" disabled>{{ 'SITIOS.ENLACES.GESTION.PLACEHOLDERSITIOS' | translate }}
                                    </option>
                                    <option [value]="sitio.sitioId" *ngFor="let sitio of sitios">
                                        {{ sitio.nombreSitio }}</option>
                                </select>
                                <label *ngIf="!sitioId.valid && (sitioId.dirty || sitioId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SITIOS.ENLACES.GESTION.REQUERIDOSITIOS' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreEnlace">{{ 'SITIOS.ENLACES.NAME' | translate
                                    }}</label>
                                <input class="form-control form-input" id="nombreEnlace" name="nombreEnlace" type="text"
                                    placeholder="{{ 'SITIOS.ENLACES.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{'is-invalid': !nombreEnlace.valid && (nombreEnlace.dirty || nombreEnlace.touched || isSubmit)}"
                                    #nombreEnlace="ngModel" required [(ngModel)]="FormRegistro.nombreEnlace" />
                                <label
                                    *ngIf="!nombreEnlace.valid && (nombreEnlace.dirty || nombreEnlace.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SITIOS.ENLACES.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'SITIOS.ENLACES.RUTA' | translate }}</label>
                                <input type="text" class="form-control form-input" name="rutaEnlace"
                                    placeholder="{{ 'SITIOS.ENLACES.GESTION.PLACEHOLDERRUTA' | translate }}"
                                    [ngClass]="{'is-invalid': !rutaEnlace.valid && (rutaEnlace.dirty || rutaEnlace.touched || isSubmit) }"
                                    #rutaEnlace="ngModel" required [(ngModel)]="FormRegistro.rutaEnlace" />
                                <label *ngIf="!rutaEnlace.valid && (rutaEnlace.dirty || rutaEnlace.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SITIOS.ENLACES.GESTION.REQUERIDORUTA' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'SITIOS.ENLACES.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoEnlace">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoEnlace">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'SITIOS.ENLACES.DESCRIPTION' | translate }}</label>
                                <app-text-editor
                                    [toolbarType]="tipoEditorTexto"
                                    [contentHtml]="FormRegistro.descripcionEnlace ?? ''"
                                    (contentHtmlChange)="actualizarDescripcionEnlace($event)"
                                    name="descripcionEnlace"
                                    [(ngModel)]="FormRegistro.descripcionEnlace"
                                    [ngClass]="{'is-invalid': !descripcionEnlace.valid && (descripcionEnlace.dirty || descripcionEnlace.touched || isSubmit)}"
                                    #descripcionEnlace="ngModel"
                                    required
                                    rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionEnlace.valid && (descripcionEnlace.dirty || descripcionEnlace.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'SITIOS.ENLACES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
