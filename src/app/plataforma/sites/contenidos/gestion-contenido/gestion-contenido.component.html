<div class="row">
    <div class="col-sm-12">
        <div class="card card-header-sticky">
            <div class="card-header">
                <h5>{{ 'CONTENIDOS.GESTION.TITLE' | translate }}</h5>
                <hr>
                <div class="row col-sm-12">
                    <div class="col-sm-6">
                        <app-breadcrumb></app-breadcrumb>
                    </div>
                    <div class="col-sm-6 justify-content-end d-flex gap-3">
                        <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro" (click)="btnInsertEditContenido(validationForm)">
                            {{ 'CONTENIDOS.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro" (click)="btnInsertEditContenido(validationForm)">
                            {{ 'CONTENIDOS.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarContenido()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <h4 *ngIf="!modoEdicion">{{ 'CONTENIDOS.NEW' | translate }}</h4>
                <h4 *ngIf="modoEdicion">{{ 'CONTENIDOS.UPDATE' | translate }}</h4>
            </div>
            <div class="card-body">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="enlaceId">
                                    {{ 'ENLACES.GESTION.SITIOS' | translate }}</label>
                                <select class="form-control input-md" name="enlaceId" id="enlaceId"
                                    [ngClass]="{ 'is-invalid': !enlaceId.valid && (enlaceId.dirty || enlaceId.touched || isSubmit) }"
                                    #enlaceId="ngModel" required [(ngModel)]="FormRegistro.enlaceId"
                                    (change)="onContenidochangeClick($event)">
                                    <option value="" disabled>{{ 'ENLACES.GESTION.PLACEHOLDERSITIOS' | translate }}
                                    </option>
                                    <option [value]="enlace.enlaceId" *ngFor="let enlace of enlaces">
                                        {{ enlace.nombreEnlace }}</option>
                                </select>
                                <label
                                    *ngIf="!enlaceId.valid && (enlaceId.dirty || enlaceId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'ENLACES.GESTION.REQUERIDOSITIOS' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreContenido">{{ 'CONTENIDOS.NAME' | translate }}</label>
                                <input class="form-control input-md" id="nombreContenido" name="nombreContenido" type="text"
                                    placeholder="{{ 'CONTENIDOS.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{'is-invalid': !nombreContenido.valid && (nombreContenido.dirty || nombreContenido.touched || isSubmit)}"
                                    #nombreContenido="ngModel" required [(ngModel)]="FormRegistro.nombreContenido" />
                                <label *ngIf="!nombreContenido.valid && (nombreContenido.dirty || nombreContenido.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'CONTENIDOS.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'CONTENIDOS.CONTENIDO' | translate }}</label>
                                <input type="text" class="form-control" name="contenido" placeholder="{{ 'CONTENIDOS.GESTION.PLACEHOLDERCONTENIDO' | translate }}"
                                    [ngClass]="{'is-invalid': !contenido.valid && (contenido.dirty || contenido.touched || isSubmit) }"
                                    #contenido="ngModel" required [(ngModel)]="FormRegistro.contenido" />
                                <label *ngIf="!contenido.valid && (contenido.dirty || contenido.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'CONTENIDOS.GESTION.REQUERIDOCONTENIDO' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'CONTENIDOS.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio"
                                            [value]="true"
                                            [(ngModel)]="FormRegistro.estadoContenido">
                                            <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="option" type="radio"
                                            [value]="false"
                                            [(ngModel)]="FormRegistro.estadoContenido">
                                            <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'CONTENIDOS.DESCRIPTION' | translate }}</label>
                                <textarea class="form-control" placeholder="{{ 'CONTENIDOS.GESTION.PLACEHOLDERDESCRIPCION' | translate }}" name="descripcionContenido"
                                    [ngClass]="{'is-invalid': !descripcionContenido.valid && (descripcionContenido.dirty || descripcionContenido.touched || isSubmit)}"
                                    #descripcionContenido="ngModel" required [(ngModel)]="FormRegistro.descripcionContenido" rows="5">
                                </textarea>
                                <label
                                    *ngIf="!descripcionContenido.valid && (descripcionContenido.dirty || descripcionContenido.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'CONTENIDOS.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
