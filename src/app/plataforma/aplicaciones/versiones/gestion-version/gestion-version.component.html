<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>

            <ng-container>
                <app-nav-content [navigationItems]="menuItems"></app-nav-content>
            </ng-container>
        </div>
    </aside>

    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'VERSIONES.GESTION.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'VERSIONES.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button *ngIf="!modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'VERSIONES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'VERSIONES.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="codigoAplicacion"> {{
                                    'VERSIONES.GESTION.APLICACION' | translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer" name="codigoAplicacion"
                                    id="codigoAplicacion"
                                    [ngClass]="{ 'is-invalid': !codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit) }"
                                    #codigoAplicacion="ngModel" required [(ngModel)]="FormRegistro.codigoAplicacion"
                                    (change)="onAplicacionchangeClick($event)">
                                    <option value="" disabled>{{ 'VERSIONES.GESTION.PLACEHOLDERAPLICACION' | translate
                                        }} </option>
                                    <option [value]="app.codigoAplicacion" *ngFor="let app of aplicaciones"> {{
                                        app.nombreAplicacion }}</option>
                                </select>
                                <label
                                    *ngIf="!codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'VERSIONES.GESTION.REQUERIDOAPLICACION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="fecha">
                                    {{ 'VERSIONES.GESTION.FECHAVERSION' | translate }}
                                </label>
                                <div class="input-group">
                                    <input class="form-control form-input" placeholder="yyyy-mm-dd" name="fecha"
                                        id="fecha" [(ngModel)]="FormRegistro.fecha" ngbDatepicker
                                        #d="ngbDatepicker" (dateSelect)="onDateChange()"
                                        [ngClass]="{ 'is-invalid': !d.valid && (d.dirty || d.touched || isSubmit) }"
                                        required />
                                    <div class="input-group-append">
                                        <button class="btn btn-outline-secondary calendar" (click)="d.toggle()"
                                            type="button">
                                            <i class="fas fa-calendar-alt"></i>
                                        </button>
                                    </div>
                                </div>
                                <label *ngIf="!d.valid && (d.dirty || d.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'VERSIONES.GESTION.REQUERIDOFECHA' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'VERSIONES.CODE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoVersion"
                                    placeholder="{{ 'VERSIONES.GESTION.PLACEHOLDERCODE' | translate }}"
                                    [ngClass]="{ 'is-invalid': !codigoVersion.valid && (codigoVersion.dirty || codigoVersion.touched || isSubmit) }"
                                    #codigoVersion="ngModel" required [(ngModel)]="FormRegistro.codigoVersion" />
                                <label
                                    *ngIf="!codigoVersion.valid && (codigoVersion.dirty || codigoVersion.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'VERSIONES.CODEHOLDER' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreVersion">{{ 'VERSIONES.NAME' | translate
                                    }}</label>
                                <input class="form-control form-input" id="nombreVersion" name="nombreVersion"
                                    type="text" placeholder="{{ 'VERSIONES.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{ 'is-invalid': !nombreVersion.valid && (nombreVersion.dirty || nombreVersion.touched || isSubmit) }"
                                    #nombreVersion="ngModel" required [(ngModel)]="FormRegistro.nombreVersion" />
                                <label
                                    *ngIf="!nombreVersion.valid && (nombreVersion.dirty || nombreVersion.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'VERSIONES.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'VERSIONES.DESCRIPTION' | translate }}</label>
                                <app-text-editor
                                    [toolbarType]="tipoEditorTexto"
                                    [(contentHtml)]="FormRegistro.descripcionVersion"
                                    (contentHtmlChange)="actualizarDescripcionVersion($event)"
                                    name="descripcionVersion"
                                    [(ngModel)]="FormRegistro.descripcionVersion"
                                    [ngClass]="{'is-invalid': !descripcionVersion.valid && (descripcionVersion.dirty || descripcionVersion.touched || isSubmit)}"
                                    #descripcionVersion="ngModel"
                                    required
                                    rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionVersion.valid && (descripcionVersion.dirty || descripcionVersion.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'VERSIONES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'VERSIONES.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoVersion" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoVersion" />
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
