<h1>Test</h1>
<app-layout [menuItems]="menuItems">
    <!-- Contenido principal sin tab de filtros -->
    <div class="card card-header-sticky">
        <div class="card-header">
            <!-- <div class="text-center"> -->
            <h4>{{ 'APLICACIONES.TITLEGEST' | translate }}</h4>
            <hr>
            <!-- </div> -->
            <div class="row col-sm-12">
                <div class="col-sm-6">
                    <app-breadcrumb></app-breadcrumb>
                </div>
                <div class="col-sm-6 justify-content-end d-flex gap-3">
                    <button *ngIf="!modoEdicion" type="button" class="btn-NuevoRegistro"
                        (click)="btnGestionarAplicacionClick(validationForm)">
                        {{ 'APLICACIONES.CREATE' | translate }}
                        <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                    </button>
                    <button *ngIf="modoEdicion" type="button" class="btn-NuevoRegistro"
                        (click)="btnGestionarAplicacionClick(validationForm)">
                        {{ 'APLICACIONES.UPDATE' | translate }}
                        <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                    </button>
                    <button type="button" class="btn-NuevoRegistro" (click)="btnRegresarClick()">
                        {{ 'PLATAFORMA.REGRESAR' | translate }}
                        <i class="feather icon-arrow-left ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h4 *ngIf="!modoEdicion">{{ 'APLICACIONES.NEW' | translate }}</h4>
            <h4 *ngIf="modoEdicion">{{ 'APLICACIONES.UPDATE' | translate }}</h4>
        </div>
        <div class="card-body">
            <form #validationForm="ngForm" class="editForm" novalidate>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-control-label" for="nombreAplicacion">nombre</label>
                            <input class="form-control input-md" id="nombreAplicacion" name="nombreAplicacion"
                                type="text" placeholder="{{ 'APLICACIONES.NAME' | translate }}"
                                [ngClass]="{'is-invalid': !nombreAplicacion.valid && (nombreAplicacion.dirty || nombreAplicacion.touched || isSubmit)}"
                                #nombreAplicacion="ngModel" required [(ngModel)]="FormRegistro.nombreAplicacion" />
                            <label
                                *ngIf="!nombreAplicacion.valid && (nombreAplicacion.dirty || nombreAplicacion.touched || isSubmit)"
                                class="error jquery-validation-error small form-text invalid-feedback">
                                {{ 'APLICACIONES.NAMEHOLDER' | translate }}
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">{{ 'APLICACIONES.CODE' | translate }}</label>
                            <input type="text" class="form-control" name="codigoAplicacion"
                                placeholder="Ruta del enlace"
                                [ngClass]="{'is-invalid': !codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit) }"
                                #codigoAplicacion="ngModel" required [(ngModel)]="FormRegistro.codigoAplicacion"
                                readonly />
                            <label
                                *ngIf="!codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit)"
                                class="error jquery-validation-error small form-text invalid-feedback">
                                {{ 'APLICACIONES.CODEHOLDER' | translate }}
                            </label>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="form-group">
                            <label class="form-label">{{ 'APLICACIONES.DESCRIPTION' | translate }}</label>
                            <textarea class="form-control"
                                placeholder="{{ 'APLICACIONES.DESCRIPTIONHOLDER' | translate }}"
                                name="descripcionAplicacion"
                                [ngClass]="{'is-invalid': !descripcionAplicacion.valid && (descripcionAplicacion.dirty || descripcionAplicacion.touched || isSubmit)}"
                                #descripcionAplicacion="ngModel" required
                                [(ngModel)]="FormRegistro.descripcionAplicacion" rows="5">
                                </textarea>
                            <label
                                *ngIf="!descripcionAplicacion.valid && (descripcionAplicacion.dirty || descripcionAplicacion.touched || isSubmit)"
                                class="error jquery-validation-error small form-text invalid-feedback">
                                {{ 'APLICACIONES.DESCRIPCIONHOLDER' | translate }}
                            </label>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="form-group">
                            <label class="form-label">{{ 'APLICACIONES.STATUS' | translate }}</label>
                            <div class="radio-buttons">
                                <label class="radio-button">
                                    <input name="option" type="radio" [value]="true"
                                        [(ngModel)]="FormRegistro.estadoAplicacion">
                                    <div class="radio-circle"></div>
                                    <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                </label><br>
                                <label class="radio-button">
                                    <input name="option" type="radio" [value]="false"
                                        [(ngModel)]="FormRegistro.estadoAplicacion">
                                    <div class="radio-circle"></div>
                                    <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</app-layout>
