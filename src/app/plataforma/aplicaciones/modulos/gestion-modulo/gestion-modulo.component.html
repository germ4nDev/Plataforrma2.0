<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>

            <ng-container>
                <app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content>
            </ng-container>
        </div>
    </aside>

    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'MODULOS.GESTION.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'MODULOS.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                        <button *ngIf="!modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'MODULOS.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'MODULOS.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="codigoModulo">
                                    {{ 'MODULOS.GESTION.APLICACION' | translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer;" name="codigoAplicacion"
                                    id="codigoAplicacion"
                                    [ngClass]="{ 'is-invalid': !codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit) }"
                                    #codigoAplicacion="ngModel" required [(ngModel)]="FormRegistro.codigoAplicacion"
                                    (change)="onAplicacionChangeClick($event)">
                                    <option value="">{{ 'MODULOS.GESTION.PLACEHOLDERAPLICACION' | translate }}
                                    </option>
                                    <option [value]="app.codigoAplicacion" *ngFor="let app of aplicaciones">
                                        {{ app.nombreAplicacion }}</option>
                                </select>
                                <label
                                    *ngIf="!codigoAplicacion.valid && (codigoAplicacion.dirty || codigoAplicacion.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'MODULOS.GESTION.REQUERIDOAPLICACION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="codigoSuite">
                                    {{ 'MODULOS.GESTION.SUITE' | translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer;" name="codigoSuite"
                                    id="codigoSuite"
                                    [ngClass]="{ 'is-invalid': !codigoSuite.valid && (codigoSuite.dirty || codigoSuite.touched || isSubmit) }"
                                    #codigoSuite="ngModel" required [(ngModel)]="FormRegistro.codigoSuite"
                                    (change)="onSuiteChangeClick($event)">
                                    <option value="">{{ 'MODULOS.GESTION.PLACEHOLDERSUITE' | translate }}
                                    </option>
                                    <option [value]="sui.codigoSuite" *ngFor="let sui of suites">
                                        {{ sui.nombreSuite }}</option>
                                </select>
                                <label
                                    *ngIf="!codigoSuite.valid && (codigoSuite.dirty || codigoSuite.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'MODULOS.GESTION.REQUERIDOAPLICACION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'MODULOS.CODE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoModulo"
                                    placeholder="{{ 'MODULOS.GESTION.PLACEHOLDERCODE' | translate }}"
                                    [ngClass]="{'is-invalid': !codigoModulo.valid && (codigoModulo.dirty || codigoModulo.touched || isSubmit) }"
                                    #codigoModulo="ngModel" required [(ngModel)]="FormRegistro.codigoModulo"
                                    readonly />
                                <label
                                    *ngIf="!codigoModulo.valid && (codigoModulo.dirty || codigoModulo.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'MODULOS.GESTION.REQUERIDCODE' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="codigoPadre">
                                    {{ 'MODULOS.GESTION.PADRE' | translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer;" name="codigoPadre"
                                    id="codigoPadre" #codigoPadre="ngModel" required [(ngModel)]="FormRegistro.codigoPadre"
                                    (change)="onCodigoPadreChangeClick($event)">
                                    <option value="">{{ 'MODULOS.GESTION.PLACEHOLDERPADRE' | translate }}
                                    </option>
                                    <option [value]="mod.codigoModulo" *ngFor="let mod of modulosPadre">
                                        {{ mod.nombreModulo }}</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreModulo">{{ 'MODULOS.NAME' | translate
                                    }}</label>
                                <input class="form-control form-input" id="nombreModulo" name="nombreModulo" type="text"
                                    placeholder="{{ 'MODULOS.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{'is-invalid': !nombreModulo.valid && (nombreModulo.dirty || nombreModulo.touched || isSubmit)}"
                                    #nombreModulo="ngModel" required [(ngModel)]="FormRegistro.nombreModulo" />
                                <label
                                    *ngIf="!nombreModulo.valid && (nombreModulo.dirty || nombreModulo.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'MODULOS.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'MODULOS.PATH' | translate }}</label>
                                <input type="text" class="form-control form-input" name="rutaModulo"
                                    placeholder="{{ 'MODULOS.GESTION.PLACEHOLDERPATH' | translate }}"
                                    #rutaModulo="ngModel" required [(ngModel)]="FormRegistro.rutaModulo" />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="precioModulo">{{ 'MODULOS.PRECIO' | translate
                                    }}</label>
                                <input class="form-control form-input" id="precioModulo" name="precioModulo" type="number"
                                    placeholder="{{ 'MODULOS.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{'is-invalid': !precioModulo.valid && (precioModulo.dirty || precioModulo.touched || isSubmit)}"
                                    #precioModulo="ngModel" required [(ngModel)]="FormRegistro.precioModulo" />
                                <label
                                    *ngIf="!precioModulo.valid && (precioModulo.dirty || precioModulo.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'MODULOS.GESTION.REQUERIDOPRECIO' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'MODULOS.ICON' | translate }}</label>
                                <input type="text" class="form-control form-input" name="icon"
                                    placeholder="{{ 'MODULOS.GESTION.PLACEHOLDERPATH' | translate }}"
                                    #icon="ngModel" [(ngModel)]="FormRegistro.icon" />
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'MODULOS.GESTION.TRANSLATEKEY' | translate }}</label>
                                <input type="text" class="form-control form-input" name="translateKey"
                                    placeholder="{{ 'MODULOS.GESTION.PLACEHOLDERPATH' | translate }}"
                                    #translateKey="ngModel" [(ngModel)]="FormRegistro.translateKey" />
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'MODULOS.DESCRIPTION' | translate }}</label>
                                <app-text-editor
                                    [toolbarType]="tipoEditorTexto"
                                    [contentHtml]="FormRegistro.descripcionModulo ?? ''"
                                    (contentHtmlChange)="actualizarDescripcionVersion($event)"
                                    name="descripcionModulo"
                                    [(ngModel)]="FormRegistro.descripcionModulo"
                                    [ngClass]="{'is-invalid': !descripcionModulo.valid && (descripcionModulo.dirty || descripcionModulo.touched || isSubmit)}"
                                    #descripcionModulo="ngModel"
                                    required
                                    rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionModulo.valid && (descripcionModulo.dirty || descripcionModulo.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'MODULOS.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'MODULOS.GESTION.HIJOS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="hijos" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.hijos">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'MODULOS.GESTION.HIJOSSI' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="hijos" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.hijos">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'MODULOS.GESTION.HIJOSNO' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'MODULOS.GESTION.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="estadoModulo" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoModulo">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="estadoModulo" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoModulo">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
