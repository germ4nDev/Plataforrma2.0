<div class="layout-wrapper">

                </button>
                <button [class.active]="activeTab === 'filters'" (click)="activeTab = 'filters'">
                    {{ 'PLATAFORMA.FILTERS' | translate }}
                </button>
            </div>

            <ng-container *ngIf="activeTab === 'menu'">
                <app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content>
            </ng-container>

    <div class="content-area">
        <div class="card card-table content-scroll-wrapper">
            <div class="card-body">
                <ng-container *ngIf="registrosFiltrado$ | async as dataFiltrada">
                    <app-data-table [data]="dataFiltrada" [idField]="'codigoAplicacion'"
                        [tableTitle]="'APLICACIONES.TITLE' | translate" [metadataColumns]="columnasRegistros"
                        [metadataDetailColumns]="columnasDetailRegistros" [showDetail]="true" [showActions]="true"
                        [showNewButton]="true" [showViewButton]="false" [showEditButton]="true"
                        [showDeleteButton]="true" [newButtonLabel]="'APLICACIONES.NEW' | translate"
                        [exportLabel]="'PLATAFORMA.EXCEL' | translate" (newRecord)="OnNuevoRegistroClick()"
                        (editRecord)="OnEditarRegistroClick($event)" (deleteRecord)="OnEliminarRegistroClick($event)">
                    </app-data-table>
                </ng-container>
                <ng-template #loading>
                    <!-- TODO mostrar un indicador de carga -->
                </ng-template>
            </div>
