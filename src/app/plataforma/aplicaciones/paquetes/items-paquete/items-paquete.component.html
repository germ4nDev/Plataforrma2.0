<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button [class.active]="activeTab === 'menu'" (click)="activeTab = 'menu'">
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
                <button [class.active]="activeTab === 'filters'" (click)="activeTab = 'filters'" *ngIf="hasFiltersSlot">
                    {{ 'PLATAFORMA.FILTERS' | translate }}
                </button>
            </div>
            <ng-container *ngIf="activeTab === 'menu'">
                <app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content>
            </ng-container>
            <ng-container *ngIf="activeTab === 'filters'">
                <div class="p-3 filtros-scroll-wrapper">
                    <h6 class="filtros-title">{{ 'ITEMSPAQUETES.FILTROS.TITULO' | translate }}</h6>
                    <div class="filtro">
                        <label class="form-control-label" for="tipoValorId"> {{ 'MODULOS.GESTION.TIPOVALOR' | translate
                            }}</label>
                        <select (change)="onTipoValorChangeClick($event)" class="form-control form-select">
                            <option value="todos">{{ 'PLATAFORMA.FILTROTODOS' | translate }}</option>
                            <option [value]="tipo.tipoValorId" *ngFor="let tipo of tiposValor"> {{ tipo.nombreTipo }}
                            </option>
                        </select>
                    </div>
                    <div class="filtro">
                        <small>{{ 'ITEMSPAQUETES.FILTROS.FILTRONOMBRE' | translate }}</small>
                        <select (change)="onFiltroValorChangeClick($event)" class="form-control form-select">
                            <option value="todos">{{ 'PLATAFORMA.FILTROTODOS' | translate }}</option>
                            <option [value]="valor.codigoValor" *ngFor="let valor of listaPrecios"> {{ valor.nombreValor
                                }}</option>
                        </select>
                    </div>
                    <div class="filtro">
                        <small>{{ 'ITEMSPAQUETES.FILTROS.FILTRONOMBRE' | translate }}</small>
                        <input type="text" (keyup)="onFiltroDescripcionChangeClick($event)"
                            class="form-control form-input"
                            placeholder="{{ 'ITEMSPAQUETES.FILTROS.DESCRIPCIONCHOLDER' | translate }}" />
                    </div>
                    <div class="filtro">
                        <small>{{ 'ITEMSPAQUETES.FILTROS.FILTRODECRIPCION' | translate }}</small>
                        <input type="text" (keyup)="onFiltroNombreCodigoClick($event)" class="form-control form-input"
                            placeholder="{{ 'ITEMSPAQUETES.FILTROS.NOMBRECHOLDER' | translate }}" />
                    </div>
                    <div class="filtro">
                        <small>{{ 'ITEMSPAQUETES.FILTROS.FILTROESTADO' | translate }}</small>
                        <select (change)="onFiltroEstadoChangeClick($event)" class="form-control form-select">
                            <option value="todos">{{ 'PLATAFORMA.FILTROTODOS' | translate }}</option>
                            <option value="true">{{ 'PLATAFORMA.ACTIVE' | translate }}</option>
                            <option value="false">{{ 'PLATAFORMA.INACTIVE' | translate }}</option>
                        </select>
                    </div>
                </div>
            </ng-container>
        </div>
    </aside>
    <div class="content-area">
        <div class="card card-table content-scroll-wrapper">
            <div class="card-body">
                <ng-container *ngIf="itemsPaqueteFiltrados$ | async as dataFiltrada">
                    <app-data-table [data]="dataFiltrada" [idField]="'codigoItem'"
                        [tableTitle]="'ITEMSPAQUETES.TITLE' | translate" [metadataColumns]="columnasPaquetes"
                        [metadataDetailColumns]="columnasDetailRegistros" [showDetail]="true" [showActions]="true"
                        [showNewButton]="true" [showBackButton]="true" [showViewButton]="false" [showEditButton]="true"
                        [showDeleteButton]="true" [newButtonLabel]="'ITEMS.NEW' | translate"
                        [exportLabel]="'PLATAFORMA.EXCEL' | translate" (newRecord)="OnNuevoRegistroClick()"
                        (editRecord)="OnEditarRegistroClick($event)" (backRecord)="OnRegresarClick()"
                        (deleteRecord)="OnEliminarRegistroClick($event)">
                    </app-data-table>
                </ng-container>
            </div>
        </div>
    </div>
</div>
