<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>
            <ng-container>
                <app-nav-content [navigationItems]="menuItems$ | async"></app-nav-content>
            </ng-container>
        </div>
    </aside>

    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'PAQUETES.GESTION.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'PAQUETES.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion" (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                        <button *ngIf="!modoEdicion" type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion" (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'PAQUETES.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion" (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'PAQUETES.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'PAQUETE.CODE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoPaquete" placeholder="{{ 'PAQUETES.GESTION.PLACEHOLDERCODE' | translate }}" [ngClass]="{'is-invalid': !codigoPaquete.valid && (codigoPaquete.dirty || codigoPaquete.touched || isSubmit) }"
                                    #codigoPaquete="ngModel" required [(ngModel)]="FormRegistro.codigoPaquete" readonly />
                                <label *ngIf="!codigoPaquete.valid && (codigoPaquete.dirty || codigoPaquete.touched || isSubmit)" class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PAQUETE.CODEHOLDER' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="nombrePaquete">{{ 'PAQUETES.NAME' | translate
                                    }}</label>
                                <input class="form-control form-input" id="nombrePaquete" name="nombrePaquete" type="text" placeholder="{{ 'PAQUETES.GESTION.PLACEHOLDERNAME' | translate }}" [ngClass]="{'is-invalid': !nombrePaquete.valid && (nombrePaquete.dirty || nombrePaquete.touched || isSubmit)}"
                                    #nombrePaquete="ngModel" required [(ngModel)]="FormRegistro.nombrePaquete" />
                                <label *ngIf="!nombrePaquete.valid && (nombrePaquete.dirty || nombrePaquete.touched || isSubmit)" class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PAQUETES.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="costoPaquete">{{ 'PAQUETES.COSTO' | translate
                                    }}</label>
                                <input class="form-control form-input" id="costoPaquete" name="costoPaquete" type="number" placeholder="{{ 'PAQUETES.GESTION.PLACEHOLDERCOSTO' | translate }}" [ngClass]="{'is-invalid': !costoPaquete.valid && (costoPaquete.dirty || costoPaquete.touched || isSubmit)}"
                                    #costoPaquete="ngModel" required [(ngModel)]="FormRegistro.costoPaquete" />
                                <label *ngIf="!costoPaquete.valid && (costoPaquete.dirty || costoPaquete.touched || isSubmit)" class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PAQUETES.GESTION.REQUERIDOCOSTO' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="precioPaquete">{{ 'PAQUETES.PRECIO' | translate
                                    }}</label>
                                <input class="form-control form-input" id="precioPaquete" name="precioPaquete" type="number" placeholder="{{ 'PAQUETES.GESTION.PLACEHOLDERNAME' | translate }}" [ngClass]="{'is-invalid': !precioPaquete.valid && (precioPaquete.dirty || precioPaquete.touched || isSubmit)}"
                                    #precioPaquete="ngModel" [(ngModel)]="FormRegistro.precioPaquete" />
                            </div>
                        </div>
                        <!-- <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="promocion">{{ 'PAQUETES.PROMOCION' | translate
                                    }}</label>
                                <div class="form-check custom-check-form">
                                    <input class="form-check-input" name="promocion" type="checkbox" (change)="onPromocionClick($event)" [(ngModel)]="FormRegistro.promocion">
                                </div>
                            </div>
                        </div> -->
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="promocion"> {{
                                    'PAQUETES.GESTION.PROMOCION' | translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer" name="promocion" id="promocion" [ngClass]="{ 'is-invalid': !promocion.valid && (promocion.dirty || promocion.touched || isSubmit) }" #promocion="ngModel" required [(ngModel)]="FormRegistro.promocion"
                                    (change)="onPromocionClick($event)">
                                    <option value="">{{ 'MODULOS.GESTION.ISPROMOCIONHOLDER' | translate }} </option>
                                    <option value="true">{{ 'MODULOS.GESTION.ISPROMOCION' | translate }} </option>
                                    <option value="false">{{ 'MODULOS.GESTION.NOISPROMOCION' | translate }} </option>
                                </select>
                                <label *ngIf="!promocion.valid && (promocion.dirty || promocion.touched || isSubmit)" class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'MODULOS.GESTION.REQUERIDOAPLICACION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="precioPromocion">{{ 'PAQUETES.PRECIO' | translate
                                    }}</label>
                                <input class="form-control form-input" id="precioPromocion" name="precioPromocion" type="number" placeholder="{{ 'PAQUETES.GESTION.PLACEHOLDERNAME' | translate }}" [(ngModel)]="FormRegistro.precioPromocion" [disabled]="isPromocion" />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'PAQUETES.GESTION.ICONO' | translate }}</label>
                                <img *ngIf="selectedFileIconoUrl" [src]="selectedFileIconoUrl" class="image-preview">
                                <div class="file-input-wrapper">
                                    <label for="fileUploadInput" class="btn btn-primary btn-NuevoRegistro">
                                        {{ 'Seleccionar archivo' | translate }}
                                    </label>
                                    <input type="file" (change)="onFileSelectedClick($event, 'icono')" accept="image/*" id="fileUploadInput" class="form-control form-input d-none" name="iconoPaquete">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'PAQUETES.GESTION.IMAGEN' | translate }}</label>
                                <img *ngIf="selectedFileImagenUrl" [src]="selectedFileImagenUrl" class="image-preview">
                                <div class="file-input-wrapper">
                                    <label for="fileUploadInput" class="btn btn-primary btn-NuevoRegistro">
                                        {{ 'Seleccionar archivo' | translate }}
                                    </label>
                                    <input type="file" (change)="onFileSelectedClick($event, 'imagen')" accept="image/*" id="fileUploadInput" class="form-control form-input d-none" name="imagenPaquete">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'PAQUETES.DESCRIPTION' | translate }}</label>
                                <app-text-editor [toolbarType]="tipoEditorTexto" [contentHtml]="FormRegistro.descripcionPaquete ?? ''" (contentHtmlChange)="actualizarDescripcionVersion($event)" name="descripcionPaquete" [(ngModel)]="FormRegistro.descripcionPaquete" [ngClass]="{'is-invalid': !descripcionPaquete.valid && (descripcionPaquete.dirty || descripcionPaquete.touched || isSubmit)}"
                                    #descripcionPaquete="ngModel" required rows="5">
                                </app-text-editor>
                                <label *ngIf="!descripcionPaquete.valid && (descripcionPaquete.dirty || descripcionPaquete.touched || isSubmit)" class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PAQUETES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'PAQUETES.ACUERDOLICENCIA' | translate }}</label>
                                <app-text-editor [toolbarType]="tipoEditorTexto" [contentHtml]="FormRegistro.acuerdoLicencia ?? ''" (contentHtmlChange)="actualizarDescripcionVersion($event)" name="acuerdoLicencia" [(ngModel)]="FormRegistro.acuerdoLicencia" [ngClass]="{'is-invalid': !acuerdoLicencia.valid && (acuerdoLicencia.dirty || acuerdoLicencia.touched || isSubmit)}"
                                    #acuerdoLicencia="ngModel" required rows="5">
                                </app-text-editor>
                                <label *ngIf="!acuerdoLicencia.valid && (acuerdoLicencia.dirty || acuerdoLicencia.touched || isSubmit)" class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PAQUETES.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'PAQUETES.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="estadoPaquete" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoPaquete">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="estadoPaquete" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoPaquete">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
                <div class="row col-md-12">
                    <div class="col-md-6 text-center">
                        <h4>{{ 'PAQUETES.MODULOSTITLE' | translate }}</h4>
                    </div>
                    <div class="col-md-6 text-center">
                        <h4>{{ 'PAQUETES.ITEMSTITLE' | translate }}</h4>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex">
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion" (click)="btnGestionarModulosClick()">
                            {{ 'PAQUETES.GESTION.CREATE' | translate }}
                        </button>
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion" (click)="btnGestionarItemsClick()">
                            {{ 'PAQUETES.UPDATE' | translate }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
