<app-nav-bar (toggleSidebar)="toggleNav()"></app-nav-bar>
<div class="layout-wrapper">
    <aside class="aside-left">
        <div class="card">
            <div class="nav-tabs-custom">
                <button>
                    {{ 'PLATAFORMA.MENU' | translate }}
                </button>
            </div>
            <ng-container>
                <app-nav-content [navigationItems]="menuItems"></app-nav-content>
            </ng-container>
        </div>
    </aside>

    <div class="form-area">
        <div class="card">
            <div class="card-header card-header-sticky">
                <div class="dt-toolbar d-flex justify-content-between align-items-center mb-2">
                    <div class="d-flex align-items-center">
                        <h4 class="datatable-title" *ngIf="!modoEdicion">{{ 'PRECIOS.GESTION.NEW' | translate }}</h4>
                        <h4 class="datatable-title" *ngIf="modoEdicion">{{ 'PRECIOS.UPDATE' | translate }}</h4>
                    </div>
                    <div class="d-flex">
                        <button type="button" class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnRegresarClick()">
                            {{ 'PLATAFORMA.REGRESAR' | translate }}
                            <i class="feather icon-arrow-left ms-2"></i>
                        </button>
                        <button *ngIf="!modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'PRECIOS.GESTION.CREATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                        <button *ngIf="modoEdicion" type="button"
                            class="btn btn-primary btn-NuevoRegistro btn-animacion"
                            (click)="btnGestionarRegistroClick(validationForm)">
                            {{ 'PRECIOS.UPDATE' | translate }}
                            <i class="feather ms-2" [ngClass]="modoEdicion ? 'icon-edit' : 'icon-plus'"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body form-scroll-wrapper">
                <form #validationForm="ngForm" class="editForm" novalidate>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-control-label" for="codigoModulo">
                                    {{ 'PRECIOS.GESTION.TIPOVALOR' | translate }}</label>
                                <select class="form-control form-input" style="cursor: pointer;" name="tipoValorId"
                                    id="tipoValorId"
                                    [ngClass]="{ 'is-invalid': !tipoValorId.valid && (tipoValorId.dirty || tipoValorId.touched || isSubmit) }"
                                    #tipoValorId="ngModel" required [(ngModel)]="FormRegistro.tipoValorId"
                                    (change)="onTipoValorChangeClick($event)">
                                    <option value="">{{ 'PRECIOS.GESTION.PLACEHOLDERTIPOBVALOR' | translate }}
                                    </option>
                                    <option [value]="reg.tipoValorId" *ngFor="let reg of tiposValor">
                                        {{ reg.nombreTipo }}</option>
                                </select>
                                <label
                                    *ngIf="!tipoValorId.valid && (tipoValorId.dirty || tipoValorId.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PRECIOS.GESTION.REQUERIDOTIPOVALOR' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'PRECIOS.GESTION.CODE' | translate }}</label>
                                <input type="text" class="form-control form-input" name="codigoValor"
                                    placeholder="{{ 'PRECIOS.GESTION.PLACEHOLDERCODE' | translate }}"
                                    [ngClass]="{'is-invalid': !codigoValor.valid && (codigoValor.dirty || codigoValor.touched || isSubmit) }"
                                    #codigoValor="ngModel" required [(ngModel)]="FormRegistro.codigoValor"
                                    readonly />
                                <label
                                    *ngIf="!codigoValor.valid && (codigoValor.dirty || codigoValor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PRECIOS.GESTION.REQUERIDCODE' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-control-label" for="nombreValor">{{ 'PRECIOS.NAME' | translate
                                    }}</label>
                                <input class="form-control form-input" id="nombreValor" name="nombreValor" type="text"
                                    placeholder="{{ 'PRECIOS.GESTION.PLACEHOLDERNAME' | translate }}"
                                    [ngClass]="{'is-invalid': !nombreValor.valid && (nombreValor.dirty || nombreValor.touched || isSubmit)}"
                                    #nombreValor="ngModel" required [(ngModel)]="FormRegistro.nombreValor" />
                                <label
                                    *ngIf="!nombreValor.valid && (nombreValor.dirty || nombreValor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PRECIOS.GESTION.REQUERIDONAME' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'PRECIOS.GESTION.VALORUNITARIO' | translate }}</label>
                                <input type="number" class="form-control form-input" name="valorUnitario"
                                    placeholder="{{ 'PRECIOS.GESTION.PLACEHOLDERVALORUNITARIO' | translate }}"
                                    [ngClass]="{'is-invalid': !valorUnitario.valid && (valorUnitario.dirty || valorUnitario.touched || isSubmit) }"
                                    #valorUnitario="ngModel" required [(ngModel)]="FormRegistro.valorUnitario" />
                                <label *ngIf="!valorUnitario.valid && (valorUnitario.dirty || valorUnitario.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PRECIOS.GESTION.REQUERIDVALORUNITARIO' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label">{{ 'PRECIOS.GESTION.COSTOVALOR' | translate }}</label>
                                <input type="number" class="form-control form-input" name="costoValor"
                                    placeholder="{{ 'PRECIOS.GESTION.PLACEHOLDERCOSTOVALOR' | translate }}"
                                    [ngClass]="{'is-invalid': !costoValor.valid && (costoValor.dirty || costoValor.touched || isSubmit) }"
                                    #costoValor="ngModel" required [(ngModel)]="FormRegistro.costoValor" />
                                <label *ngIf="!costoValor.valid && (costoValor.dirty || costoValor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PRECIOS.GESTION.REQUERIDCOSTOVALOR' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'PRECIOS.DESCRIPTION' | translate }}</label>
                                <app-text-editor
                                    [toolbarType]="tipoEditorTexto"
                                    [(contentHtml)]="FormRegistro.descripcionValor"
                                    (contentHtmlChange)="actualizarDescripcionVersion($event)"
                                    name="descripcionValor"
                                    [(ngModel)]="FormRegistro.descripcionValor"
                                    [ngClass]="{'is-invalid': !descripcionValor.valid && (descripcionValor.dirty || descripcionValor.touched || isSubmit)}"
                                    #descripcionValor="ngModel"
                                    required
                                    rows="5">
                                </app-text-editor>
                                <label
                                    *ngIf="!descripcionValor.valid && (descripcionValor.dirty || descripcionValor.touched || isSubmit)"
                                    class="error jquery-validation-error small form-text invalid-feedback">
                                    {{ 'PRECIOS.GESTION.REQUERIDODESCRIPCION' | translate }}
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-group">
                                <label class="form-label">{{ 'PRECIOS.STATUS' | translate }}</label>
                                <div class="radio-buttons">
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="true"
                                            [(ngModel)]="FormRegistro.estadoValor">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.ACTIVE' | translate }}</label>
                                    </label>
                                    <label class="radio-button">
                                        <input name="option" type="radio" [value]="false"
                                            [(ngModel)]="FormRegistro.estadoValor">
                                        <div class="radio-circle"></div>
                                        <label class="radio-label">{{ 'PLATAFORMA.INACTIVE' | translate }}</label>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
